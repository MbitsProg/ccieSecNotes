<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="theme-color" content="#0f1117"/>
<title>cmdref</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0f1117;--surface:#161a24;--card:#1c2130;--card2:#212636;
  --border:rgba(255,255,255,0.07);--border-em:rgba(255,255,255,0.13);
  --text:#e8eaf0;--muted:#8b90a0;--hint:#555b6e;
  --accent:#e09840;--accent-dim:rgba(224,152,64,0.12);--accent-text:#f0b860;
  --tag-bg:rgba(55,138,221,0.15);--tag-text:#7db8f0;
  --danger:#e24b4a;--success:#4caf7d;
  --mono:'Cascadia Code','Fira Code','Consolas',monospace;
  --sans:'Segoe UI',system-ui,sans-serif;
  --radius:8px;--radius-lg:12px;--nav-h:52px;
  /* syntax colors */
  --syn-prompt:#f0b860;   /* ASA# Router# lines */
  --syn-on-device:#64d8a0;  /* On R1: On ASA: etc */
  --syn-task:#ff9d6c;       /* TASK keyword */
  --syn-on-line:#1a2e20;    /* background tint for On X: lines */
  --syn-output:#9db8d2;   /* show output lines */
  --syn-comment:#6a9955;  /* ! comment lines */
  --syn-keyword:#c792ea;  /* keywords: no, default, permit, deny */
  --syn-interface:#89ddff;/* interface/ip/nat lines */
}
html,body{height:100%;overflow:hidden;}
body{font-family:var(--sans);background:var(--bg);color:var(--text);display:flex;flex-direction:column;font-size:16px;}

/* ── Nav ── */
#topnav{height:var(--nav-h);flex-shrink:0;display:flex;align-items:center;gap:10px;padding:0 16px;border-bottom:0.5px solid var(--border);background:var(--surface);z-index:50;}
#hamburger{display:none;border:none;background:none;cursor:pointer;color:var(--muted);font-size:20px;padding:4px 6px;line-height:1;}
.logo{font-family:var(--mono);font-size:14px;color:var(--accent);font-weight:600;letter-spacing:0.05em;}
.tagline{font-size:11px;color:var(--hint);}
.spacer{flex:1;}
.nav-btn{padding:5px 11px;border-radius:var(--radius);border:0.5px solid var(--border-em);background:transparent;cursor:pointer;font-size:11px;color:var(--muted);font-family:var(--sans);white-space:nowrap;}
.nav-btn:hover{color:var(--accent);border-color:var(--accent);}
#sync-status{font-size:10px;color:var(--hint);display:flex;align-items:center;gap:5px;}
#sync-dot{width:6px;height:6px;border-radius:50%;background:var(--hint);flex-shrink:0;}
#sync-dot.ok{background:var(--success);}
#sync-dot.saving{background:var(--accent);}
#sync-dot.err{background:var(--danger);}

/* ── Layout ── */
#layout{display:flex;flex:1;overflow:hidden;position:relative;}

/* ── Sidebar ── */
#sidebar{width:280px;flex-shrink:0;border-right:0.5px solid var(--border);background:var(--surface);display:flex;flex-direction:column;overflow:hidden;transition:transform 0.25s ease;}
#search-wrap{padding:10px 12px;border-bottom:0.5px solid var(--border);}
#search{width:100%;padding:8px 10px;border:0.5px solid var(--border-em);border-radius:var(--radius);background:var(--card);color:var(--text);font-size:14px;font-family:var(--sans);outline:none;}
#search:focus{border-color:var(--accent);}
#sort-bar{padding:5px 12px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;gap:4px;flex-wrap:wrap;}
#sort-bar label{font-size:10px;color:var(--hint);text-transform:uppercase;letter-spacing:0.06em;flex-shrink:0;}
.sort-btn{border:0.5px solid var(--border);border-radius:var(--radius);background:none;cursor:pointer;font-size:10px;color:var(--hint);padding:3px 7px;font-family:var(--sans);white-space:nowrap;}
.sort-btn:hover{color:var(--accent);border-color:var(--accent);}
.sort-btn.active{color:var(--accent-text);border-color:var(--accent);background:var(--accent-dim);}
#tree{flex:1;overflow-y:auto;padding:4px 0;-webkit-overflow-scrolling:touch;}
#tree::-webkit-scrollbar{width:3px;}
#tree::-webkit-scrollbar-thumb{background:var(--border-em);border-radius:2px;}
.node-btn{width:100%;text-align:left;border:none;background:none;cursor:pointer;display:flex;align-items:center;gap:6px;color:var(--text);transition:background .1s;}
.node-btn:hover{background:var(--card);}
.node-btn.active{background:var(--accent-dim);color:var(--accent-text);}
.chevron{font-size:9px;color:var(--hint);transition:transform .15s;display:inline-block;flex-shrink:0;}
.open>.node-btn .chevron{transform:rotate(90deg);}
.node-label{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.node-id{font-family:var(--mono);flex-shrink:0;}
.node-badge{font-size:10px;background:var(--card2);border:0.5px solid var(--border);border-radius:10px;padding:1px 5px;color:var(--hint);flex-shrink:0;margin-left:auto;}
.node-dot{width:5px;height:5px;border-radius:50%;background:var(--hint);flex-shrink:0;}
.node-dot.filled{background:var(--accent);}
.lvl1>.node-btn{padding:8px 14px;font-size:13px;font-weight:500;}
.lvl1-children{display:none;}
.lvl1.open>.lvl1-children{display:block;}
.lvl2>.node-btn{padding:6px 14px 6px 26px;font-size:12px;}
.lvl2-children{display:none;}
.lvl2.open>.lvl2-children{display:block;}
.lvl3>.node-btn{padding:5px 14px 5px 40px;font-size:12px;color:var(--muted);}
.lvl3>.node-btn.active{color:var(--accent-text);}
.lvl3-children{display:none;}
.lvl3.open>.lvl3-children{display:block;}
.lvl4>.node-btn{padding:5px 14px 5px 54px;font-size:11px;color:var(--hint);}
.lvl4>.node-btn.active{color:var(--accent-text);}
#sidebar-actions{border-top:0.5px solid var(--border);}
.btn-add-sec{width:100%;text-align:left;border:none;background:none;cursor:pointer;padding:10px 14px;font-size:12px;color:var(--hint);display:flex;align-items:center;gap:6px;}
.btn-add-sec:hover{color:var(--accent);}
#sidebar-footer{padding:7px 14px;border-top:0.5px solid var(--border);font-size:10px;color:var(--hint);}
#sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:30;}

/* ── Main ── */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
#breadbar{padding:9px 16px;border-bottom:0.5px solid var(--border);background:var(--surface);display:flex;align-items:center;gap:10px;flex-shrink:0;min-height:44px;}
#breadcrumb{font-size:12px;color:var(--hint);flex:1;font-family:var(--mono);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
#breadcrumb .hi{color:var(--accent-text);}
.desktop-only{display:inline-flex;}
#content{flex:1;overflow-y:auto;padding:28px 32px;-webkit-overflow-scrolling:touch;}
#content::-webkit-scrollbar{width:4px;}
#content::-webkit-scrollbar-thumb{background:var(--border-em);border-radius:3px;}

/* ── Loading ── */
#loading-screen{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:200;}
#loading-screen .l-logo{font-family:var(--mono);font-size:20px;color:var(--accent);font-weight:600;}
.spinner{width:20px;height:20px;border:2px solid var(--border-em);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes pulse-border{0%{box-shadow:0 0 0 0 rgba(224,152,64,0.6);}70%{box-shadow:0 0 0 6px rgba(224,152,64,0);}100%{box-shadow:0 0 0 0 rgba(224,152,64,0);}}
@keyframes spin{to{transform:rotate(360deg);}}

/* ── Welcome ── */
#welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:14px;opacity:0.4;}
#welcome .wicon{font-size:36px;}
#welcome p{font-size:13px;color:var(--muted);text-align:center;max-width:260px;line-height:1.6;}

/* ── Folder view ── */
.folder-id{font-family:var(--mono);font-size:22px;font-weight:600;color:var(--accent-text);margin-bottom:2px;}
.folder-title-text{font-size:14px;color:var(--muted);margin-bottom:16px;}
.folder-actions{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:28px;}
.children-list{display:flex;flex-direction:column;gap:6px;}
.child-card{background:var(--card);border:0.5px solid var(--border);border-radius:var(--radius);padding:13px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:border-color .15s;}
.child-card:hover{border-color:var(--border-em);}
.child-card .c-id{font-family:var(--mono);font-size:13px;color:var(--accent-text);flex-shrink:0;min-width:64px;}
.child-card .c-title{font-size:15px;color:var(--muted);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.child-card .c-meta{font-size:11px;color:var(--hint);flex-shrink:0;}
.child-card .c-arrow{color:var(--hint);font-size:13px;flex-shrink:0;}

/* ── Inline add form ── */
.inline-form{background:var(--card);border:0.5px solid var(--accent);border-radius:var(--radius-lg);padding:20px 22px;margin-bottom:20px;}
.inline-form h3{font-size:13px;font-weight:500;color:var(--accent-text);margin-bottom:16px;}
.if-row{margin-bottom:12px;}
.if-row label{display:block;font-size:10px;text-transform:uppercase;letter-spacing:0.07em;color:var(--hint);margin-bottom:5px;}
.if-row input{width:100%;padding:9px 12px;border:0.5px solid var(--border-em);border-radius:var(--radius);background:var(--surface);color:var(--text);font-size:13px;font-family:var(--sans);outline:none;}
.if-row input:focus{border-color:var(--accent);}
.if-actions{display:flex;gap:8px;margin-top:16px;}
.if-save{padding:8px 20px;border-radius:var(--radius);border:none;background:var(--accent);cursor:pointer;font-size:13px;color:#1a1200;font-family:var(--sans);font-weight:600;}
.if-cancel{padding:8px 16px;border-radius:var(--radius);border:0.5px solid var(--border-em);background:transparent;cursor:pointer;font-size:13px;color:var(--muted);font-family:var(--sans);}

/* ── Entry topbar ── */
.entry-topbar{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;gap:12px;}
.entry-meta{min-width:0;}
.entry-id{font-family:var(--mono);font-size:26px;font-weight:600;color:var(--accent-text);}
.entry-title-disp{font-size:17px;color:var(--muted);margin-top:4px;}
.entry-actions{display:flex;gap:8px;align-items:center;flex-shrink:0;}
.btn-sm{padding:6px 12px;border-radius:var(--radius);border:0.5px solid var(--border-em);background:var(--card);cursor:pointer;font-size:12px;color:var(--muted);font-family:var(--sans);}
.btn-sm:hover{color:var(--text);}
.btn-sm.danger:hover{color:var(--danger);border-color:var(--danger);}
.btn-sm.primary{color:var(--accent-text);border-color:var(--accent);background:var(--accent-dim);}
.btn-sm.primary:hover{background:rgba(224,152,64,0.22);}

/* ── Tags ── */
.tags-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:18px;}
.tag{background:var(--tag-bg);color:var(--tag-text);font-size:11px;padding:3px 10px;border-radius:20px;font-weight:500;}

/* ── Unified content block (view mode) ── */
.content-block{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:0;margin-bottom:18px;font-family:var(--mono);font-size:13px;line-height:1.85;overflow:hidden;}
.content-block-inner{padding:18px 22px;white-space:pre-wrap;word-break:break-word;font-size:15px;line-height:1.95;}
.copy-bar{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;border-top:0.5px solid var(--border);background:var(--card2);}
.copy-bar span{font-size:10px;color:var(--hint);}
.copy-btn{border:0.5px solid var(--border);border-radius:var(--radius);background:var(--card);cursor:pointer;font-size:11px;color:var(--hint);padding:4px 12px;font-family:var(--sans);}
.copy-btn:hover{color:var(--accent-text);border-color:var(--accent);}

/* ── Tabs ── */
.tab-bar{display:flex;gap:0;border-bottom:0.5px solid var(--border);margin-bottom:20px;}
.tab-btn{padding:9px 20px;border:none;background:none;cursor:pointer;font-size:13px;color:var(--muted);font-family:var(--sans);border-bottom:2px solid transparent;margin-bottom:-0.5px;}
.tab-btn:hover{color:var(--text);}
.tab-btn.active{color:var(--accent-text);border-bottom-color:var(--accent);font-weight:500;}
.tab-panel{display:none;}
.tab-panel.active{display:block;}

/* ── Commands summary ── */
.cmd-summary-group{margin-bottom:22px;}
.cmd-summary-device{font-size:11px;text-transform:uppercase;letter-spacing:0.09em;color:var(--hint);margin-bottom:8px;padding-bottom:4px;border-bottom:0.5px solid var(--border);}
.cmd-summary-device .device-label{color:var(--syn-on-device);font-weight:600;}
.cmd-line{display:flex;align-items:baseline;gap:10px;padding:4px 0;border-bottom:0.5px solid var(--border);}
.cmd-line:last-child{border-bottom:none;}
.cmd-line-text{font-family:var(--mono);font-size:14px;color:var(--accent-text);flex:1;white-space:pre-wrap;word-break:break-all;}

.cmd-summary-empty{color:var(--hint);font-size:13px;padding:20px 0;}

/* ── Syntax highlighting ── */
.syn-prompt{color:var(--syn-prompt);font-weight:600;}
.syn-on-device{color:var(--syn-on-device);font-weight:700;font-size:1.05em;display:inline-block;margin-top:4px;}
.syn-task{color:var(--syn-task);font-weight:700;text-transform:uppercase;letter-spacing:0.04em;}
.syn-inline-cmd{color:var(--accent-text);font-family:var(--mono);}
.syn-output{color:var(--syn-output);}
.syn-comment{color:var(--syn-comment);font-style:italic;}
.syn-keyword{color:var(--syn-keyword);}
.syn-bold{font-weight:700;color:#ffe566;font-size:1.06em;text-shadow:0 0 10px rgba(255,229,102,0.45);letter-spacing:0.01em;}

/* ── Images in view ── */
.images-section{margin-bottom:18px;}
.field-label{font-size:10px;text-transform:uppercase;letter-spacing:0.09em;color:var(--hint);margin-bottom:8px;}
.img-grid{display:flex;flex-wrap:wrap;gap:10px;margin-top:8px;}
.img-thumb{position:relative;border-radius:var(--radius);border:0.5px solid var(--border);overflow:hidden;cursor:zoom-in;}
.img-thumb img{display:block;max-width:min(360px,100%);max-height:260px;object-fit:cover;}
.img-del{position:absolute;top:5px;right:5px;background:rgba(0,0,0,0.75);border:none;border-radius:var(--radius);cursor:pointer;font-size:11px;color:#fff;padding:3px 8px;display:none;}
.img-thumb:hover .img-del{display:block;}
.img-drop-zone{border:1.5px dashed var(--border-em);border-radius:var(--radius);padding:20px 16px;text-align:center;cursor:pointer;font-size:12px;color:var(--hint);margin-top:8px;position:relative;transition:border-color .15s,color .15s;}
.img-drop-zone:hover,.img-drop-zone.drag-over{border-color:var(--accent);color:var(--accent-text);}
.img-drop-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;}
.img-caption{font-size:11px;color:var(--hint);margin-top:4px;}

/* ── Editor ── */
.entry-editor{width:100%;}
.ee-row{margin-bottom:18px;}
.ee-label{font-size:10px;text-transform:uppercase;letter-spacing:0.09em;color:var(--hint);margin-bottom:6px;display:flex;align-items:center;gap:8px;}
.ee-hint{font-size:10px;color:var(--hint);font-weight:400;text-transform:none;letter-spacing:0;}
.ee-input{width:100%;padding:10px 12px;border:0.5px solid var(--border-em);border-radius:var(--radius);background:var(--surface);color:var(--text);font-size:16px;font-family:var(--sans);outline:none;}
.ee-input:focus{border-color:var(--accent);}
/* unified textarea - auto-grows via JS */
.ee-unified{width:100%;padding:16px 18px;border:0.5px solid var(--border-em);border-radius:var(--radius-lg);background:var(--surface);color:var(--text);font-size:15px;font-family:var(--mono);outline:none;resize:vertical;line-height:1.9;min-height:calc(100vh - 320px);overflow-y:auto;overflow-anchor:none;}
.ee-unified:focus{border-color:var(--accent);}
.ee-tags-input{font-family:var(--sans);}
.autosave-bar{display:flex;align-items:center;gap:10px;padding:12px 0 4px;border-top:0.5px solid var(--border);margin-top:8px;}
/* ── Notebook block editor ── */
.nb-editor{width:100%;}
.nb-block{position:relative;margin-bottom:0;}
.nb-text-block textarea{
  width:100%;padding:14px 16px;
  border:0.5px solid transparent;
  border-radius:var(--radius);
  background:transparent;
  color:var(--text);font-size:15px;font-family:var(--mono);
  outline:none;resize:none;line-height:1.9;
  min-height:60px;overflow-y:hidden;
  transition:border-color .15s,background .15s;
  overflow-anchor:none;
}
.nb-text-block textarea:focus{
  border-color:var(--border-em);
  background:var(--surface);
}
.nb-img-block{position:relative;margin:8px 0;border-radius:var(--radius-lg);overflow:hidden;border:0.5px solid var(--border);}
.nb-img-block img{display:block;width:100%;height:auto;cursor:zoom-in;}
.nb-img-block.sz-small img{max-width:320px;}
.nb-img-block.sz-medium img{max-width:600px;}
.nb-img-block.sz-full img{max-width:100%;}
.nb-img-controls{
  position:absolute;top:8px;right:8px;
  display:none;gap:4px;
}
.nb-img-block:hover .nb-img-controls{display:flex;}
.nb-img-btn{
  padding:3px 9px;border-radius:var(--radius);border:0.5px solid var(--border-em);
  background:rgba(15,17,23,0.85);cursor:pointer;font-size:11px;
  color:var(--text);font-family:var(--sans);backdrop-filter:blur(4px);
}
.nb-img-btn:hover{color:var(--accent-text);border-color:var(--accent);}
.nb-img-btn.danger:hover{color:var(--danger);border-color:var(--danger);}
.nb-img-caption{font-size:11px;color:var(--hint);padding:5px 10px;background:var(--card2);}

/* Insert-image zone between blocks */
.nb-insert-zone{
  position:relative;height:24px;display:flex;align-items:center;justify-content:center;
  opacity:0;transition:opacity .2s;
}
.nb-insert-zone:hover{opacity:1;}
.nb-insert-line{position:absolute;left:0;right:0;top:50%;height:1px;background:var(--accent);opacity:0.4;}
.nb-insert-btn{
  position:relative;z-index:1;
  padding:2px 10px;border-radius:20px;border:0.5px solid var(--accent);
  background:var(--card);cursor:pointer;font-size:11px;color:var(--accent-text);
  font-family:var(--sans);display:flex;align-items:center;gap:5px;
}
.nb-insert-btn:hover{background:var(--accent-dim);}
.nb-drop-active{background:var(--accent-dim);border-radius:var(--radius);outline:2px dashed var(--accent);}

/* View mode inline images */
.nb-view-img{margin:12px 0;border-radius:var(--radius-lg);overflow:hidden;border:0.5px solid var(--border);}
.nb-view-img img{display:block;width:100%;height:auto;cursor:zoom-in;}
.nb-view-img.sz-small img{max-width:320px;}
.nb-view-img.sz-medium img{max-width:600px;}
.nb-view-img.sz-full img{max-width:100%;}

.edit-mode-banner{display:flex;align-items:center;gap:8px;padding:9px 14px;margin-bottom:18px;background:var(--card2);border-radius:var(--radius);border-left:3px solid var(--accent);font-size:12px;color:var(--muted);}
.edit-mode-icon{color:var(--accent-text);font-size:14px;}
.edit-mode-sep{color:var(--hint);}
.edit-mode-note{color:var(--hint);font-size:11px;}
.ee-save-btn{padding:9px 24px;border-radius:var(--radius);border:none;background:var(--accent);cursor:pointer;font-size:13px;color:#1a1200;font-family:var(--sans);font-weight:600;}
.ee-save-btn:hover{opacity:0.9;}
.ee-discard-btn{padding:9px 16px;border-radius:var(--radius);border:0.5px solid var(--border-em);background:transparent;cursor:pointer;font-size:13px;color:var(--muted);font-family:var(--sans);}
.ee-discard-btn:hover{color:var(--text);}
.autosave-hint{font-size:11px;color:var(--hint);}
.autosave-hint.saved{color:var(--success);}

/* ── Lightbox ── */
#lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:999;align-items:center;justify-content:center;padding:16px;}
#lightbox.open{display:flex;}
#lightbox img{max-width:100%;max-height:100%;border-radius:var(--radius-lg);object-fit:contain;}
#lightbox-close{position:fixed;top:16px;right:16px;background:var(--card2);border:0.5px solid var(--border-em);border-radius:var(--radius);color:var(--muted);cursor:pointer;font-size:13px;padding:7px 14px;font-family:var(--sans);}

/* ── Toast ── */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--card2);border:0.5px solid var(--accent);border-radius:var(--radius);padding:8px 18px;font-size:12px;color:var(--accent-text);z-index:9999;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap;}
#toast.show{opacity:1;}

/* ── Mobile ── */
@media(max-width:640px){
  #hamburger{display:block;}

async function sbFetch(path,opts={}){
  const res=await fetch(`${SB_URL}/rest/v1${path}`,{...opts,headers:{'apikey':SB_KEY,'Authorization':`Bearer ${SB_KEY}`,'Content-Type':'application/json','Prefer':'resolution=merge-duplicates',...(opts.headers||{})}});

/* ── Auto-save draft to localStorage (backup only, not primary storage) ── */
function saveDraft(entryId,content,tags,title){
  try{localStorage.setItem('draft_'+entryId,JSON.stringify({content,tags,title,ts:Date.now()}));}catch(e){}
}
function loadDraft(entryId){
  try{const d=localStorage.getItem('draft_'+entryId);return d?JSON.parse(d):null;}catch(e){return null;}
}
function hasDraftNewer(entryId,entry){
  const draft=loadDraft(entryId);
  return draft&&draft.ts>((entry.updatedAt?new Date(entry.updatedAt).getTime():0));
}
function clearDraft(entryId){
  try{localStorage.removeItem('draft_'+entryId);}catch(e){}
}

/* ── Sort ── */
function setSort(mode){
  if(sortMode===mode){sortAsc=!sortAsc;}else{sortMode=mode;sortAsc=true;}
  ['created','modified','alpha','dir'].forEach(m=>{const b=document.getElementById('sb-'+m);if(b)b.className='sort-btn'+(m===sortMode?' active':'');});
  document.getElementById('sb-dir').textContent=sortAsc?'↑ Asc':'↓ Desc';
  renderTree();
}
function sortNodes(nodes){
  return[...nodes].sort((a,b)=>{
    let c=0;
    if(sortMode==='alpha')c=(a.id||'').localeCompare(b.id||'',undefined,{numeric:true});
    else if(sortMode==='modified')c=(a.updatedAt||a.createdAt||'').localeCompare(b.updatedAt||b.createdAt||'');
    else c=(a.createdAt||'').localeCompare(b.createdAt||'');
    return sortAsc?c:-c;
  });
}

/* ── Node helpers ── */
function findNode(id,nodes){for(const n of nodes){if(n.id===id)return n;if(n.children){const f=findNode(id,n.children);if(f)return f;}}return null;}
function getDepth(id,nodes,d=0){for(const n of nodes){if(n.id===id)return d;if(n.children){const r=getDepth(id,n.children,d+1);if(r!==-1)return r;}}return -1;}
function isLeaf(node){return!node.children;}
function countLeaves(node){if(isLeaf(node))return 1;return(node.children||[]).reduce((a,c)=>a+countLeaves(c),0);}
function totalLeaves(){return db.sections.reduce((a,c)=>a+countLeaves(c),0);}
function allTitles(excludeId){const t=[];function w(n){n.forEach(x=>{if(x.id!==excludeId)t.push(x.title.trim().toLowerCase());if(x.children)w(x.children);});}w(db.sections);return t;}
function buildBreadcrumbParts(targetId,nodes=db.sections,path=[]){
  for(const n of nodes){
    const cur=[...path,{id:n.id,title:n.title}];
    if(n.id===targetId)return cur;
    if(n.children){const r=buildBreadcrumbParts(targetId,n.children,cur);if(r)return r;}
  }
  return null;
}

/* ── Syntax highlighter ── */

// Detects "On X:" device-targeting lines
// Matches: "On R1:", "On ASA:", "On FTD:", "On ISE:", "On SW1:", etc.
const ON_DEVICE_RE = /^(On\s+[A-Za-z0-9_\-]+\s*:)/i;
// Detects TASK keyword at start of line or standalone
const TASK_RE = /TASK/g;
// Detects prompt lines: word(context)# or word#
const PROMPT_RE = /^[A-Za-z0-9_][A-Za-z0-9_\-]*(\([^)]*\))*#(\s|\S|$)/;
// Inline command marker: "some text # command here"
// The # must be preceded by a space (not a prompt # which is at end of hostname)
const INLINE_CMD_RE = /^(.*?)\s#\s(.+)$/;
// Guard: lines that are NTP/status legends (start with * + - x ~ space) are NOT inline commands
function isStatusLine(line){
  return /^\s*[\*\+\-x~#]\s/.test(line.trim()) || /^\s*[A-Z]\s/.test(line);
}

function applyBold(escaped){
  return escaped.replace(/\*\*(.+?)\*\*/g,'<span class="syn-bold">$1</span>');
}
// Strip ** markers for plain text output (command summary, copy)
function stripBold(text){
  return text.replace(/\*\*(.+?)\*\*/g,'$1');
}
function applyTask(html){
  return html.replace(/\bTASK\b/g,'<span class="syn-task"><strong>TASK</strong></span>');
}

function highlightSmart(raw){
  if(!raw)return'';
  const lines = raw.split('\n');
  return lines.map(line => {
    const escaped = escHtml(line);
    let html = applyBold(escaped);

    // Empty line
    if(!line.trim()) return html;

    // "On X:" device line — full line gets device color
    if(ON_DEVICE_RE.test(line.trim())){
      // Highlight the "On X:" part, rest is normal text
      html = html.replace(
        /(On\s+[A-Za-z0-9_\-]+\s*:)/i,
        '<span class="syn-on-device">$1</span>'
      );
      return '<span>' + applyTask(html) + '</span>';
    }

    // TASK keyword line (line starts with TASK or TASK is prominent)
    if(/^TASK/i.test(line.trim())){
      return '<span class="syn-task">' + html + '</span>';
    }

    // ! comment / separator
    if(/^\s*!/.test(line)){
      return '<span class="syn-comment">' + html + '</span>';
    }

    // Prompt line: hostname# or hostname(config)#
    if(PROMPT_RE.test(line.trim())){
      return '<span class="syn-prompt">' + applyTask(html) + '</span>';
    }

    // Inline command marker: "description text # cisco command here"
    // Skip status/legend lines like "* sys.peer, # selected, + candidate..."
    const inlineMatch = !isStatusLine(line) ? line.match(INLINE_CMD_RE) : null;
    if(inlineMatch){
      const descPart = escHtml(inlineMatch[1]);
      const cmdPart  = escHtml(inlineMatch[2]);
      return applyTask(applyBold(descPart)) +
             ' <span style="color:var(--hint)">#</span> ' +
             '<span class="syn-inline-cmd">' + applyBold(cmdPart) + '</span>';
    }

    // Default — plain note text, apply TASK highlight and bold
    return applyTask(html);
  }).join('\n');
}

/* ── Command extractor (for summary tab) ── */
function extractCommands(raw){
  if(!raw) return [];
  const lines = raw.split('\n');
  // groups: { device: 'On R1', commands: ['cmd1','cmd2'] }
  const groups = [];
  let currentDevice = 'General';
  let onDeviceOverride = false; // true when "On X:" label was explicitly set

  lines.forEach(line => {
    const trimmed = line.trim();
    if(!trimmed) return;

    // Explicit "On X:" label — takes priority and locks device
    const devMatch = trimmed.match(/^(On\s+[A-Za-z0-9_\-]+\s*):/i);
    if(devMatch){
      currentDevice = devMatch[1].trim();
      onDeviceOverride = true;
      return;
    }

    // Inline command: "description # command" — skip status/legend lines
    const inlineMatch = !isStatusLine(line) ? line.match(INLINE_CMD_RE) : null;
    if(inlineMatch){
      const cmd = inlineMatch[2].trim();
      if(cmd) addCmd(groups, currentDevice, cmd);
      return;
    }

    // Prompt line: ASA(config)# / R1(config-if)# / SW1# etc.
    const promptMatch = trimmed.match(/^([A-Za-z0-9][A-Za-z0-9_\-]*)(\([^)]*\))*#\s*(\S.*)/);
    if(promptMatch){
      const hostname = promptMatch[1];
      const cmd = promptMatch[3].trim();
      // Auto-switch device group to match the hostname from the prompt
      // "On X:" labels override, otherwise hostname drives the group
      if(currentDevice === 'General' || !onDeviceOverride){
        currentDevice = hostname;
      }
      if(cmd) addCmd(groups, currentDevice, cmd);
      return;
    }
    // Bare prompt line with no command (e.g. "ASA(config)#") — update device context
    const barePrompt = trimmed.match(/^([A-Za-z0-9][A-Za-z0-9_\-]*)(\([^)]*\))*#\s*$/);
    if(barePrompt){
      const hostname = barePrompt[1];
      if(currentDevice === 'General' || !onDeviceOverride) currentDevice = hostname;
      return;
    }
  });

  return groups;
}

function addCmd(groups, device, cmd){
  let grp = groups.find(g => g.device === device);
  if(!grp){ grp = {device, commands:[]}; groups.push(grp); }
  grp.commands.push(cmd); // allow duplicates — exit/end appear multiple times intentionally
}

function renderCmdSummary(raw){
  const groups = extractCommands(raw);
  if(!groups.length || groups.every(g=>!g.commands.length)){
    return '<div class="cmd-summary-empty">No commands detected yet.<br><span style="font-size:12px;">Use <code style="background:var(--card2);padding:1px 5px;border-radius:4px;">description # command</code> in your notes, or type prompt lines like <code style="background:var(--card2);padding:1px 5px;border-radius:4px;">ASA# show run</code></span></div>';
  }
  return groups.filter(g=>g.commands.length).map(grp=>`
    <div class="cmd-summary-group">
      <div class="cmd-summary-device"><span class="device-label">${escHtml(grp.device)}</span></div>
      ${grp.commands.map((cmd,i)=>`
        <div class="cmd-line">
          <span class="cmd-line-text">${escHtml(stripBold(cmd))}</span>
        </div>`).join('')}
    </div>`).join('');
}

function copyText(text, btn){
  navigator.clipboard.writeText(text).then(()=>{
    const orig=btn.textContent; btn.textContent='✓'; btn.style.color='var(--success)';
    setTimeout(()=>{btn.textContent=orig;btn.style.color='';},1800);
  }).catch(()=>{showToast('Copied');});
}


/* ── Tree render ── */
function renderTree(){
  const tree=document.getElementById('tree');
  const q=filterText.toLowerCase();
  tree.innerHTML='';
  function nodeMatches(n){
    if(isLeaf(n))return!q||n.id.includes(q)||n.title.toLowerCase().includes(q)||(n.content||'').toLowerCase().includes(q);
    return(n.children||[]).some(c=>nodeMatches(c));
  }
  function buildNode(node,depth){
    if(q&&!nodeMatches(node))return null;
    const leaf=isLeaf(node);
    const isOpen=q?true:openNodes.has(node.id);
    const isActive=activePath[activePath.length-1]===node.id;
    const wrap=document.createElement('div');
    wrap.className=`node lvl${depth+1}`+(!leaf&&isOpen?' open':'');
    const btn=document.createElement('button');
    btn.className='node-btn'+(isActive?' active':'');
    if(!leaf){const ch=document.createElement('span');ch.className='chevron';ch.textContent='▶';btn.appendChild(ch);}
    else{const d=document.createElement('span');d.className='node-dot'+(node.content||node.images?.length?' filled':'');btn.appendChild(d);}
    const idS=document.createElement('span');idS.className='node-id';idS.style.fontSize=depth===0?'14px':'13px';idS.textContent=node.id;btn.appendChild(idS);
    const lblS=document.createElement('span');lblS.className='node-label';lblS.style.cssText='font-size:12px;color:var(--hint);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;';lblS.textContent=node.title;btn.appendChild(lblS);
    if(!leaf){const bg=document.createElement('span');bg.className='node-badge';bg.textContent=countLeaves(node);btn.appendChild(bg);}
    btn.onclick=()=>{
      if(leaf){selectEntry(node.id);closeSidebar();}
      else{
        if(openNodes.has(node.id))openNodes.delete(node.id);else openNodes.add(node.id);
        activePath=buildBreadcrumbParts(node.id)?.map(p=>p.id)||[node.id];
        renderTree();showFolderView(node.id);
      }
    };
    wrap.appendChild(btn);
    if(!leaf&&node.children){
      const cc=document.createElement('div');cc.className=`lvl${depth+1}-children`;
      sortNodes(node.children).forEach(child=>{const el=buildNode(child,depth+1);if(el)cc.appendChild(el);});
      wrap.appendChild(cc);
    }
    return wrap;
  }
  sortNodes(db.sections).forEach(sec=>{const el=buildNode(sec,0);if(el)tree.appendChild(el);});
  const sf=document.getElementById('sidebar-footer');
  if(sf)sf.textContent=`${db.sections.length} sections · ${totalLeaves()} tasks`;
}

/* ── Breadcrumb ── */
function setBreadcrumb(nodeId){
  const parts=buildBreadcrumbParts(nodeId);
  if(!parts){document.getElementById('breadcrumb').textContent='select a task';return;}
  document.getElementById('breadcrumb').innerHTML=parts.map((p,i)=>
    i<parts.length-1?`<span style="cursor:pointer;color:var(--muted)" onclick="showFolderView('${esc(p.id)}')">${esc(p.id)}</span> <span style="color:var(--hint);margin:0 4px;">/</span>`
    :`<span class="hi">${esc(p.id)}</span>`
  ).join('');
}

/* ── Folder view ── */
function showFolderView(nodeId){
  const node=findNode(nodeId,db.sections);if(!node||isLeaf(node))return;
  const depth=getDepth(nodeId,db.sections);
  activePath=buildBreadcrumbParts(nodeId)?.map(p=>p.id)||[nodeId];
  editingEntryId=null;
  setBreadcrumb(nodeId);renderTree();
  const childItems=sortNodes(node.children||[]).map(c=>{
    const meta=isLeaf(c)?(c.tags||[]).slice(0,2).join(', ')||'':(`${countLeaves(c)} tasks`);
    return`<div class="child-card" onclick="${isLeaf(c)?`selectEntry('${esc(c.id)}')`:`showFolderView('${esc(c.id)}')`}">
      <span class="c-id">${esc(c.id)}</span><span class="c-title">${esc(c.title)}</span>
      <span class="c-meta">${esc(meta)}</span><span class="c-arrow">›</span></div>`;
  }).join('');
  const addBtns=[
    depth===0?`<button class="btn-sm primary desktop-only" onclick="showAddTaskForm('${esc(nodeId)}','subsection')">+ Add subsection</button>`:'',
    depth===1?`<button class="btn-sm primary desktop-only" onclick="showAddTaskForm('${esc(nodeId)}','task')">+ Add task</button>`:'',
    `<button class="btn-sm desktop-only" onclick="showRenameForm('${esc(nodeId)}')">Rename</button>`,
    `<button class="btn-sm danger desktop-only" onclick="deleteNode('${esc(nodeId)}')">Delete</button>`
  ].join('');
  const depthLabel = ['Section','Subsection',''][depth] || '';
  document.getElementById('content').innerHTML=`
    <div style="font-size:10px;text-transform:uppercase;letter-spacing:0.08em;color:var(--hint);margin-bottom:6px;">${depthLabel}</div>
    <div class="folder-id">${esc(node.id)}</div>
    <div class="folder-title-text">${esc(node.title)}</div>
    <div class="folder-actions">${addBtns}</div>
    <div id="inline-form-area"></div>
    <div class="children-list">${childItems||'<div style="color:var(--hint);font-size:13px;padding:20px 0;">No items yet.</div>'}</div>`;
  document.getElementById('content').scrollTop=0;
}

/* ── Inline forms ── */

      <h3>New section</h3>

      <div class="if-actions"><button class="if-save" onclick="submitAddNode(null,0)">Add section</button><button class="if-cancel" onclick="cancelForm()">Cancel</button></div>
    </div>`;
  document.getElementById('breadcrumb').textContent='new section';
  setTimeout(()=>document.getElementById('f-nid')?.focus(),50);
}

function showAddTaskForm(parentId,type){
  const area=document.getElementById('inline-form-area');if(!area)return;
  const isTask=type==='task';
  area.innerHTML=`
    <div class="inline-form">
      <h3>${isTask?'New task':'New subsection'}</h3>
      <div class="if-row"><label>ID</label><input id="f-nid" placeholder="e.g. 5.1 or ASA-VPN"/></div>
      <div class="if-row"><label>Title</label><input id="f-ntitle" placeholder="Descriptive name"/></div>
      <div class="if-actions"><button class="if-save" onclick="${isTask?`submitAddTask('${esc(parentId)}')`:`submitAddNode('${esc(parentId)}',1)`}">${isTask?'Add task':'Add subsection'}</button><button class="if-cancel" onclick="document.getElementById('inline-form-area').innerHTML=''">Cancel</button></div>
    </div>`;
  setTimeout(()=>document.getElementById('f-nid')?.focus(),50);
}

function showRenameForm(nodeId){
  const node=findNode(nodeId,db.sections);if(!node)return;
  // If rename form already open, scroll to it
  const existingForm = document.getElementById('inline-form-area')?.querySelector('.inline-form');
  if(existingForm){
    existingForm.scrollIntoView({behavior:'smooth', block:'nearest'});
    existingForm.querySelector('input')?.focus();
    return;
  }
  const area=document.getElementById('inline-form-area');
  const target=area||document.getElementById('content');
  target.innerHTML=`
    <div class="inline-form">
      <h3>Edit ID &amp; Title</h3>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
        <div class="if-row">
          <label>ID</label>
          <input id="f-nid" value="${esc(node.id)}" style="font-family:var(--mono);color:var(--accent-text);" placeholder="e.g. 1.1"/>
        </div>
        <div class="if-row">
          <label>Title</label>
          <input id="f-ntitle" value="${esc(node.title)}" placeholder="Descriptive name"/>
        </div>
      </div>
      <div class="if-actions">
        <button class="if-save" onclick="submitRename('${esc(nodeId)}')">Save</button>
        <button class="if-cancel" onclick="showFolderView('${esc(nodeId)}')">Cancel</button>
      </div>
    </div>`;
  setTimeout(()=>document.getElementById('f-nid')?.focus(),50);
  // Enter to save on both fields
  ['f-nid','f-ntitle'].forEach(id=>{
    document.getElementById(id)?.addEventListener('keydown',e=>{
      if(e.key==='Enter') submitRename(nodeId);
      if(e.key==='Escape') showFolderView(nodeId);
    });
  });
}

function cancelForm(){
  document.getElementById('content').innerHTML=`<div id="welcome"><div class="wicon">⌨</div><p>Select a task from the sidebar or add a new section.</p></div>`;
  document.getElementById('breadcrumb').textContent='select a task';
}

/* ── Submit ── */
function submitAddNode(parentId,depth){
  const id=document.getElementById('f-nid').value.trim();
  const title=document.getElementById('f-ntitle').value.trim();
  if(!id){showToast('ID is required');document.getElementById('f-nid').focus();return;}
  if(findNode(id,db.sections)){showToast('That ID already exists.');return;}
  if(title&&allTitles().includes(title.toLowerCase())){showToast(`"${title}" is already used.`);return;}
  const now=new Date().toISOString();
  const newNode={id,title:title||id,children:[],createdAt:now,updatedAt:now};
  if(!parentId){db.sections.push(newNode);}
  else{const parent=findNode(parentId,db.sections);if(!parent)return;if(!parent.children)parent.children=[];parent.children.push(newNode);}
  persist();openNodes.add(id);if(parentId)openNodes.add(parentId);
  activePath=parentId?[...buildBreadcrumbParts(parentId).map(p=>p.id),id]:[id];
  renderTree();showFolderView(id);
}

function submitAddTask(parentId){
  const id=document.getElementById('f-nid').value.trim();
  const title=document.getElementById('f-ntitle').value.trim();
  if(!id){showToast('ID is required');document.getElementById('f-nid').focus();return;}
  if(findNode(id,db.sections)){showToast('That ID already exists.');return;}
  if(title&&allTitles().includes(title.toLowerCase())){showToast(`"${title}" is already used.`);return;}
  const now=new Date().toISOString();
  const parent=findNode(parentId,db.sections);if(!parent)return;
  // New unified model: single 'content' field + tags + images
  const entry={id,title:title||id,content:'',tags:[],images:[],createdAt:now,updatedAt:now};
  if(!parent.children)parent.children=[];
  parent.children.push(entry);
  persist();openNodes.add(parentId);
  activePath=[...buildBreadcrumbParts(parentId).map(p=>p.id),id];
  renderTree();selectEntry(id);
}

function submitRename(nodeId){
  const node=findNode(nodeId,db.sections);if(!node)return;
  const newTitle=(document.getElementById('f-ntitle')?.value||'').trim();
  const newId=(document.getElementById('f-nid')?.value||'').trim();
  // Validate title
  if(newTitle&&newTitle.toLowerCase()!==node.title.toLowerCase()&&allTitles(nodeId).includes(newTitle.toLowerCase())){
    showToast('"'+newTitle+'" is already used.');return;
  }
  // Validate ID
  if(newId && newId!==node.id){
    if(findNode(newId,db.sections)){showToast('ID "'+newId+'" is already used.');return;}
  }
  if(newTitle) node.title=newTitle;
  const finalId = (newId && newId!==nodeId) ? newId : nodeId;
  if(newId && newId!==nodeId){
    node.id=newId;
    // Update activePath if this node is in current path
    activePath=activePath.map(p=>p===nodeId?newId:p);
    // Update openNodes
    if(openNodes.has(nodeId)){openNodes.delete(nodeId);openNodes.add(newId);}
  }
  node.updatedAt=new Date().toISOString();
  persist();renderTree();showFolderView(finalId);
  showToast('Saved ✓');
}

/* ── Migration ── */
function migrateEntry(entry){
  // Step 1: commands+notes → content string
  if(entry.content===undefined){
    const parts=[];
    if(entry.commands&&entry.commands.trim())parts.push(entry.commands.trim());
    if(entry.notes&&entry.notes.trim()){if(parts.length)parts.push('');parts.push(entry.notes.trim());}
    entry.content=parts.join('\n');
    delete entry.commands; delete entry.notes;
  }
  // Step 2: content string + images[] → blocks[]
  if(!entry.blocks){
    entry.blocks=[];
    if(entry.content) entry.blocks.push({type:'text',content:entry.content});
    (entry.images||[]).forEach(img=>{
      entry.blocks.push({type:'image',data:img.data,name:img.name||'image',size:'full'});
    });
    delete entry.images;
    // Keep content for Commands Summary extraction (derived from blocks)
  }
  // Always keep entry.content in sync for extractCommands
  entry.content = entry.blocks.filter(b=>b.type==='text').map(b=>b.content).join('\n');
  return entry;
}

// Get all images from blocks
function entryImages(entry){
  return (entry.blocks||[]).filter(b=>b.type==='image');
}

/* ── Select entry ── */
function selectEntry(entryId){
  const node=findNode(entryId,db.sections);if(!node)return;
  migrateEntry(node);
  activePath=buildBreadcrumbParts(entryId).map(p=>p.id);
  openNodes.add(activePath[0]);if(activePath[1])openNodes.add(activePath[1]);
  editingEntryId=null;
  renderTree();renderEntryView(entryId);
}

function saveField(entryId, field){
  const entry = findNode(entryId, db.sections); if(!entry) return;
  const val = document.getElementById('fe-input')?.value || '';
  if(field === 'title'){
    const newTitle = (document.getElementById('fe-input')?.value || '').trim();
    const newId    = (document.getElementById('fe-id')?.value    || '').trim();
    // Validate title uniqueness
    if(newTitle && newTitle.toLowerCase()!==entry.title.toLowerCase() && allTitles(entryId).includes(newTitle.toLowerCase())){
      showToast('"'+newTitle+'" is already used.'); return;
    }
    // Validate ID uniqueness (must not exist elsewhere)
    if(newId && newId !== entry.id){
      const existing = findNode(newId, db.sections);
      if(existing){ showToast('ID "'+newId+'" is already used.'); return; }
    }
    if(newTitle) entry.title = newTitle;
    if(newId && newId !== entry.id){
      // Update activePath to reflect new ID
      entry.id = newId;
      activePath = activePath.map(p => p === entryId ? newId : p);
      entryId = newId; // update local var for re-render
    }
  } else if(field === 'tags'){
    entry.tags = val.split(',').map(t=>t.trim()).filter(Boolean);
  }
  entry.updatedAt = new Date().toISOString();
  persist(); renderTree(); renderEntryView(entryId); showToast('Saved ✓');
}

function closeFieldEdit(entryId){
  const ov = document.getElementById('field-edit-overlay');
  if(ov) ov.remove();
}

// escJs: escape for JS string literals inside HTML onclick attributes
function escJs(s){ return String(s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'\\"'); }

/* ── Entry EDITOR — notebook block editor ── */

// Working copy of blocks during editing (not saved until user hits Save)
let editorBlocks = [];

function renderEntryEditor(entryId){
  const entry=findNode(entryId,db.sections);if(!entry)return;
  migrateEntry(entry);
  editingEntryId=entryId;
  setBreadcrumb(entryId);

  // Start with a copy of blocks for editing
  // Check draft
  const draft=loadDraft(entryId);
  const hasDraft=draft&&draft.ts>((entry.updatedAt?new Date(entry.updatedAt).getTime():0));
  editorBlocks = hasDraft && draft.blocks
    ? JSON.parse(JSON.stringify(draft.blocks))
    : JSON.parse(JSON.stringify(entry.blocks||[]));

  // Ensure at least one text block
  if(!editorBlocks.length) editorBlocks.push({type:'text',content:''});

  const contentEl=document.getElementById('content');
  contentEl.innerHTML=`
    <div class="nb-editor" id="nb-editor-root">
      <div class="edit-mode-banner">
        <span class="edit-mode-icon">✎</span>
        <span>Notebook editor — text &amp; images inline</span>
        <span class="edit-mode-sep">·</span>
        <span class="edit-mode-note">**bold** · hostname# = prompt · On R1: = device · ! = comment</span>
      </div>
      ${hasDraft?`<div style="background:var(--accent-dim);border:0.5px solid var(--accent);border-radius:var(--radius);padding:9px 14px;margin-bottom:14px;font-size:12px;color:var(--accent-text);">
        ⚠ Draft recovered. <button onclick="clearDraft('${esc(entryId)}');renderEntryEditor('${esc(entryId)}')" style="margin-left:8px;background:none;border:0.5px solid var(--accent);border-radius:var(--radius);color:var(--accent-text);cursor:pointer;font-size:11px;padding:2px 8px;">Discard</button>
      </div>`:''}
      <div id="nb-blocks-container"></div>
      <div class="autosave-bar">
        <button class="ee-save-btn" onclick="submitEditEntry('${esc(entryId)}')">Save</button>
        <button class="ee-discard-btn" onclick="discardEdit('${esc(entryId)}')">Discard</button>
        <span class="autosave-hint" id="autosave-hint">Auto-saves draft locally</span>
      </div>
    </div>`;

  contentEl.scrollTop=0;
  renderEditorBlocks(entryId);
  startDraftAutosave(entryId);
}

function renderEditorBlocks(entryId){
  const container=document.getElementById('nb-blocks-container');
  if(!container)return;
  container.innerHTML='';
  editorBlocks.forEach((blk,i)=>{
    // Insert zone before each block
    container.appendChild(makeInsertZone(entryId, i));
    // Block itself
    if(blk.type==='text'){
      container.appendChild(makeTextBlock(entryId, i, blk));
    } else if(blk.type==='image'){
      container.appendChild(makeImageBlock(entryId, i, blk));
    }
  });
  // Insert zone at end
  container.appendChild(makeInsertZone(entryId, editorBlocks.length));
}

function makeInsertZone(entryId, insertIdx){
  const div=document.createElement('div');
  div.className='nb-insert-zone';
  div.dataset.idx=insertIdx;
  // Drag-over target
  div.addEventListener('dragover',e=>{
    e.preventDefault();
    div.classList.add('nb-drop-active');
  });
  div.addEventListener('dragleave',()=>div.classList.remove('nb-drop-active'));
  div.addEventListener('drop',e=>{
    e.preventDefault();
    div.classList.remove('nb-drop-active');
    const files=Array.from(e.dataTransfer.files).filter(f=>f.type.startsWith('image/'));
    if(files.length) insertImagesAt(entryId, insertIdx, files);
  });
  div.innerHTML=`<div class="nb-insert-line"></div>
    <button class="nb-insert-btn" title="Insert image here">
      📷 Insert image
    </button>`;
  div.querySelector('.nb-insert-btn').addEventListener('click',()=>{
    triggerImageInsert(entryId, insertIdx);
  });
  return div;
}

function makeTextBlock(entryId, i, blk){
  const wrap=document.createElement('div');
  wrap.className='nb-block nb-text-block';
  wrap.dataset.idx=i;
  const ta=document.createElement('textarea');
  ta.value=blk.content||'';
  ta.placeholder='Type commands, show output, or notes here…';
  ta.spellcheck=false;
  // Auto-grow
  const scrollBox=document.getElementById('content');
  function grow(){
    const sy=scrollBox?scrollBox.scrollTop:0;
    ta.style.height='0';
    ta.style.height=ta.scrollHeight+'px';
    if(scrollBox)scrollBox.scrollTop=sy;
  }
  ta.addEventListener('input',()=>{
    blk.content=ta.value;
    grow();
    scheduleDraftSave(entryId);
  });
  ta.addEventListener('keydown',e=>{
    // Ctrl+Enter inserts a new text block after this one
    if(e.key==='Enter'&&e.ctrlKey){
      e.preventDefault();
      editorBlocks.splice(i+1,0,{type:'text',content:''});
      renderEditorBlocks(entryId);
      // Focus the new block
      setTimeout(()=>{
        const textareas=document.querySelectorAll('#nb-blocks-container .nb-text-block textarea');
        textareas[i+1]?.focus();
      },30);
    }
  });
  wrap.appendChild(ta);
  setTimeout(grow,10);
  return wrap;
}

function makeImageBlock(entryId, i, blk){
  const wrap=document.createElement('div');
  const sz=blk.size||'full';
  wrap.className=`nb-block nb-img-block sz-${sz}`;
  wrap.dataset.idx=i;
  // Draggable for repositioning
  wrap.draggable=true;
  wrap.addEventListener('dragstart',e=>{
    e.dataTransfer.setData('nb-block-idx',String(i));
    e.dataTransfer.effectAllowed='move';
  });
  const img=document.createElement('img');
  img.src=blk.data;
  img.alt=blk.name||'image';
  img.title='Click to view full size';
  img.addEventListener('click',()=>{
    document.getElementById('lightbox-img').src=blk.data;
    document.getElementById('lightbox').classList.add('open');
  });
  // Controls
  const ctrl=document.createElement('div');
  ctrl.className='nb-img-controls';
  ctrl.innerHTML=`
    <button class="nb-img-btn" onclick="cycleImgSize('${esc(entryId)}',${i})" title="Cycle size: small / medium / full">⇔ ${sz}</button>
    <button class="nb-img-btn danger" onclick="deleteBlock('${esc(entryId)}',${i})">✕</button>`;
  const cap=document.createElement('div');
  cap.className='nb-img-caption';
  cap.textContent=blk.name||'image';
  wrap.appendChild(img);
  wrap.appendChild(ctrl);
  wrap.appendChild(cap);
  // Accept drops on image block to reorder
  wrap.addEventListener('dragover',e=>{e.preventDefault();});
  wrap.addEventListener('drop',e=>{
    e.preventDefault();
    const fromIdx=parseInt(e.dataTransfer.getData('nb-block-idx'));
    if(isNaN(fromIdx)||fromIdx===i)return;
    const moved=editorBlocks.splice(fromIdx,1)[0];
    const toIdx=fromIdx<i?i-1:i;
    editorBlocks.splice(toIdx,0,moved);
    renderEditorBlocks(entryId);
    scheduleDraftSave(entryId);
  });
  return wrap;
}

function cycleImgSize(entryId, i){
  const sizes=['small','medium','full'];
  const blk=editorBlocks[i];if(!blk||blk.type!=='image')return;
  const cur=blk.size||'full';
  blk.size=sizes[(sizes.indexOf(cur)+1)%sizes.length];
  renderEditorBlocks(entryId);
}

function deleteBlock(entryId, i){
  if(editorBlocks[i]?.type==='image'&&!confirm('Remove this image?'))return;
  editorBlocks.splice(i,1);
  if(!editorBlocks.some(b=>b.type==='text')) editorBlocks.push({type:'text',content:''});
  renderEditorBlocks(entryId);
  scheduleDraftSave(entryId);
}

// Hidden file input for inserting images at position
let _insertCallback=null;
function triggerImageInsert(entryId, idx){
  let fi=document.getElementById('nb-file-insert');
  if(!fi){
    fi=document.createElement('input');
    fi.id='nb-file-insert';fi.type='file';fi.accept='image/*';fi.multiple=true;
    fi.style.display='none';
    document.body.appendChild(fi);
  }
  fi.value='';
  _insertCallback=(files)=>insertImagesAt(entryId,idx,files);
  fi.onchange=e=>{ if(_insertCallback) _insertCallback(Array.from(e.target.files)); };
  fi.click();
}

function insertImagesAt(entryId, idx, files){
  const pending={n:files.length,done:0};
  const toInsert=[];
  files.forEach(file=>{
    const reader=new FileReader();
    reader.onload=ev=>{
      toInsert.push({type:'image',data:ev.target.result,name:file.name,size:'full'});
      pending.done++;
      if(pending.done===pending.n){
        toInsert.forEach((blk,j)=>editorBlocks.splice(idx+j,0,blk));
        renderEditorBlocks(entryId);
        scheduleDraftSave(entryId);
      }
    };
    reader.readAsDataURL(file);
  });
}

// Auto-save draft
let _draftTimer=null;
function scheduleDraftSave(entryId){
  clearTimeout(_draftTimer);
  _draftTimer=setTimeout(()=>{
    try{localStorage.setItem('draft_'+entryId,JSON.stringify({blocks:editorBlocks,ts:Date.now()}));}catch(e){}
    const hint=document.getElementById('autosave-hint');
    if(hint){hint.textContent='Draft saved ✓';hint.className='autosave-hint saved';setTimeout(()=>{if(hint){hint.textContent='Auto-saves draft locally';hint.className='autosave-hint';}},2000);}
  },3000);
}
function startDraftAutosave(entryId){
  // Kick off initial check — handled per-block input events
}

function discardEdit(entryId){
  clearDraft(entryId);
  editingEntryId=null;
  editorBlocks=[];
  renderEntryView(entryId);
}

/* ── Save entry ── */
function submitEditEntry(entryId){
  const entry=findNode(entryId,db.sections);if(!entry)return;
  // Save blocks from editor working copy
  entry.blocks=JSON.parse(JSON.stringify(editorBlocks));
  // Keep content string in sync for Commands Summary
  entry.content=entry.blocks.filter(b=>b.type==='text').map(b=>b.content).join('\n');
  entry.updatedAt=new Date().toISOString();
  clearDraft(entryId);
  editingEntryId=null;
  editorBlocks=[];
  persist();renderTree();renderEntryView(entryId);showToast('Saved ✓');
}

/* ── Delete ── */
function deleteNode(nodeId){
  const node=findNode(nodeId,db.sections);
  if(!confirm(`Delete ${isLeaf(node)?`task ${nodeId}`:`section ${nodeId} and all its contents`}?`))return;
  function removeFrom(nodes){const idx=nodes.findIndex(n=>n.id===nodeId);if(idx!==-1){nodes.splice(idx,1);return true;}for(const n of nodes){if(n.children&&removeFrom(n.children))return true;}return false;}
  removeFrom(db.sections);
  persist();activePath=[];editingEntryId=null;openNodes.delete(nodeId);renderTree();
  document.getElementById('content').innerHTML=`<div id="welcome"><div class="wicon">⌨</div><p>Deleted.</p></div>`;
  document.getElementById('breadcrumb').textContent='select a task';
}

/* ── Copy content ── */
function copyContent(entryId,btn){
  const entry=findNode(entryId,db.sections);if(!entry)return;
  const text=(entry.blocks||[]).filter(b=>b.type==='text').map(b=>b.content).join('\n');
  if(!text)return;
  navigator.clipboard.writeText(text).then(()=>{
    btn.textContent='Copied ✓';btn.style.color='var(--success)';
    setTimeout(()=>{btn.textContent='Copy text';btn.style.color='';},2000);
  }).catch(()=>{const ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);showToast('Copied ✓');});
}

/* ── Images — paste inserts at focused block position ── */
document.addEventListener('paste',e=>{
  const entryId=activePath[activePath.length-1];if(!entryId)return;
  const entry=findNode(entryId,db.sections);if(!entry||!isLeaf(entry))return;
  const items=Array.from(e.clipboardData.items).filter(it=>it.type.startsWith('image/'));
  if(!items.length)return;
  e.preventDefault();e.stopPropagation();
  const files=items.map(it=>it.getAsFile());
  if(editingEntryId===entryId){
    // Find which text block is focused to insert image after it
    const focused=document.activeElement;
    let insertIdx=editorBlocks.length; // default: append at end
    if(focused&&focused.tagName==='TEXTAREA'){
      const blkEl=focused.closest('.nb-block');
      if(blkEl){
        const idx=parseInt(blkEl.dataset.idx);
        if(!isNaN(idx)) insertIdx=idx+1;
      }
    }
    insertImagesAt(entryId,insertIdx,files);
    showToast('Image pasted ✓');
  } else {
    // View mode — append to blocks
    const blks=entry.blocks||[];
    let pending=files.length;
    files.forEach(f=>{
      const reader=new FileReader();
      reader.onload=ev=>{
        blks.push({type:'image',data:ev.target.result,name:`pasted-${Date.now()}.png`,size:'full'});
        if(--pending===0){
          entry.blocks=blks;
          entry.content=blks.filter(b=>b.type==='text').map(b=>b.content).join('\n');
          persist();renderEntryView(entryId);showToast('Image pasted ✓');
        }
      };
      reader.readAsDataURL(f);
    });
  }
},true);

// Image file upload from toolbar (view mode drop)
function handleViewDrop(e,entryId){
  e.preventDefault();
  const files=Array.from(e.dataTransfer.files).filter(f=>f.type.startsWith('image/'));
  if(!files.length)return;
  const entry=findNode(entryId,db.sections);if(!entry)return;
  let pending=files.length;
  files.forEach(f=>{
    const reader=new FileReader();
    reader.onload=ev=>{
      entry.blocks.push({type:'image',data:ev.target.result,name:f.name,size:'full'});
      if(--pending===0){
        entry.content=entry.blocks.filter(b=>b.type==='text').map(b=>b.content).join('\n');
        persist();renderEntryView(entryId);showToast('Image added ✓');
      }
    };
    reader.readAsDataURL(f);
  });
}

/* ── Lightbox ── */
function openLightbox(entryId,idx){
  // Legacy: idx into images[] — now use block idx
  const entry=findNode(entryId,db.sections);if(!entry)return;
  const imgs=(entry.blocks||[]).filter(b=>b.type==='image');
  const img=imgs[idx];if(!img)return;
  document.getElementById('lightbox-img').src=img.data;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox(){document.getElementById('lightbox').classList.remove('open');}

/* ── Search / Sidebar ── */
function filterTree(q){filterText=q;renderTree();}
function toggleSidebar(){const sb=document.getElementById('sidebar'),ov=document.getElementById('sidebar-overlay');const o=sb.classList.toggle('open');ov.classList.toggle('open',o);}
function closeSidebar(){document.getElementById('sidebar').classList.remove('open');document.getElementById('sidebar-overlay').classList.remove('open');}

/* ── Export / Import ── */
function exportData(){const blob=new Blob([JSON.stringify(db,null,2)],{type:'application/json'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='cmdref-backup.json';a.click();URL.revokeObjectURL(url);}
function importData(){document.getElementById('import-file').click();}
function handleImport(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const parsed=JSON.parse(ev.target.result);
      if(!parsed.sections)throw new Error();
      if(confirm('Replace all current data with this backup?')){
        db=parsed;persist();activePath=[];openNodes.clear();editingEntryId=null;renderTree();
        document.getElementById('content').innerHTML=`<div id="welcome"><div class="wicon">⌨</div><p>Imported successfully.</p></div>`;
        document.getElementById('breadcrumb').textContent='select a task';
        showToast('Import successful ✓');
      }
    }catch{alert('Invalid backup file.');}
  };
  reader.readAsText(file);e.target.value='';
}

/* ── Helpers ── */
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2400);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function escHtml(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

/* ── Boot ── */
(async()=>{
  try{db=await loadFromDB();setSyncStatus('ok');}
  catch(e){setSyncStatus('err');showToast('Could not connect to database');db={sections:[]};}
  document.getElementById('loading-screen').style.display='none';
  renderTree();
})();
</script>
