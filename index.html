<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="theme-color" content="#0f1117"/>
<title>cmdref</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0f1117;--surface:#161a24;--card:#1c2130;--card2:#212636;
  --border:rgba(255,255,255,0.07);--border-em:rgba(255,255,255,0.13);
  --text:#e8eaf0;--muted:#8b90a0;--hint:#555b6e;
  --accent:#e09840;--accent-dim:rgba(224,152,64,0.12);--accent-text:#f0b860;
  --tag-bg:rgba(55,138,221,0.15);--tag-text:#7db8f0;
  --danger:#e24b4a;--success:#4caf7d;
  --mono:'Cascadia Code','Fira Code','Consolas',monospace;
  --sans:'Segoe UI',system-ui,sans-serif;
  --radius:8px;--radius-lg:12px;--nav-h:52px;
  /* syntax colors */
  --syn-prompt:#f0b860;   /* ASA# Router# lines */
  --syn-output:#9db8d2;   /* show output lines */
  --syn-comment:#6a9955;  /* ! comment lines */
  --syn-keyword:#c792ea;  /* keywords: no, default, permit, deny */
  --syn-interface:#89ddff;/* interface/ip/nat lines */
}
html,body{height:100%;overflow:hidden;}
body{font-family:var(--sans);background:var(--bg);color:var(--text);display:flex;flex-direction:column;}

/* ── Nav ── */
#topnav{height:var(--nav-h);flex-shrink:0;display:flex;align-items:center;gap:10px;padding:0 16px;border-bottom:0.5px solid var(--border);background:var(--surface);z-index:50;}
#hamburger{display:none;border:none;background:none;cursor:pointer;color:var(--muted);font-size:20px;padding:4px 6px;line-height:1;}
.logo{font-family:var(--mono);font-size:14px;color:var(--accent);font-weight:600;letter-spacing:0.05em;}
.tagline{font-size:11px;color:var(--hint);}
.spacer{flex:1;}
.nav-btn{padding:5px 11px;border-radius:var(--radius);border:0.5px solid var(--border-em);background:transparent;cursor:pointer;font-size:11px;color:var(--muted);font-family:var(--sans);white-space:nowrap;}
.nav-btn:hover{color:var(--accent);border-color:var(--accent);}
#sync-status{font-size:10px;color:var(--hint);display:flex;align-items:center;gap:5px;}
#sync-dot{width:6px;height:6px;border-radius:50%;background:var(--hint);flex-shrink:0;}
#sync-dot.ok{background:var(--success);}
#sync-dot.saving{background:var(--accent);}
#sync-dot.err{background:var(--danger);}

/* ── Layout ── */
#layout{display:flex;flex:1;overflow:hidden;position:relative;}

/* ── Sidebar ── */
#sidebar{width:280px;flex-shrink:0;border-right:0.5px solid var(--border);background:var(--surface);display:flex;flex-direction:column;overflow:hidden;transition:transform 0.25s ease;}
#search-wrap{padding:10px 12px;border-bottom:0.5px solid var(--border);}
#search{width:100%;padding:8px 10px;border:0.5px solid var(--border-em);border-radius:var(--radius);background:var(--card);color:var(--text);font-size:13px;font-family:var(--sans);outline:none;}
#search:focus{border-color:var(--accent);}
#sort-bar{padding:5px 12px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;gap:4px;flex-wrap:wrap;}
#sort-bar label{font-size:10px;color:var(--hint);text-transform:uppercase;letter-spacing:0.06em;flex-shrink:0;}
.sort-btn{border:0.5px solid var(--border);border-radius:var(--radius);background:none;cursor:pointer;font-size:10px;color:var(--hint);padding:3px 7px;font-family:var(--sans);white-space:nowrap;}
.sort-btn:hover{color:var(--accent);border-color:var(--accent);}
.sort-btn.active{color:var(--accent-text);border-color:var(--accent);background:var(--accent-dim);}
#tree{flex:1;overflow-y:auto;padding:4px 0;-webkit-overflow-scrolling:touch;}
#tree::-webkit-scrollbar{width:3px;}
#tree::-webkit-scrollbar-thumb{background:var(--border-em);border-radius:2px;}
.node-btn{width:100%;text-align:left;border:none;background:none;cursor:pointer;display:flex;align-items:center;gap:6px;color:var(--text);transition:background .1s;}
.node-btn:hover{background:var(--card);}
.node-btn.active{background:var(--accent-dim);color:var(--accent-text);}
.chevron{font-size:9px;color:var(--hint);transition:transform .15s;display:inline-block;flex-shrink:0;}
.open>.node-btn .chevron{transform:rotate(90deg);}
.node-label{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.node-id{font-family:var(--mono);flex-shrink:0;}
.node-badge{font-size:10px;background:var(--card2);border:0.5px solid var(--border);border-radius:10px;padding:1px 5px;color:var(--hint);flex-shrink:0;margin-left:auto;}
.node-dot{width:5px;height:5px;border-radius:50%;background:var(--hint);flex-shrink:0;}
.node-dot.filled{background:var(--accent);}
.lvl1>.node-btn{padding:8px 14px;font-size:13px;font-weight:500;}
.lvl1-children{display:none;}
.lvl1.open>.lvl1-children{display:block;}
.lvl2>.node-btn{padding:6px 14px 6px 26px;font-size:12px;}
.lvl2-children{display:none;}
.lvl2.open>.lvl2-children{display:block;}
.lvl3>.node-btn{padding:5px 14px 5px 40px;font-size:12px;color:var(--muted);}
.lvl3>.node-btn.active{color:var(--accent-text);}
#sidebar-actions{border-top:0.5px solid var(--border);}
.btn-add-sec{width:100%;text-align:left;border:none;background:none;cursor:pointer;padding:10px 14px;font-size:12px;color:var(--hint);display:flex;align-items:center;gap:6px;}
.btn-add-sec:hover{color:var(--accent);}
#sidebar-footer{padding:7px 14px;border-top:0.5px solid var(--border);font-size:10px;color:var(--hint);}
#sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:30;}

/* ── Main ── */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
#breadbar{padding:9px 16px;border-bottom:0.5px solid var(--border);background:var(--surface);display:flex;align-items:center;gap:10px;flex-shrink:0;min-height:44px;}
#breadcrumb{font-size:12px;color:var(--hint);flex:1;font-family:var(--mono);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
#breadcrumb .hi{color:var(--accent-text);}
.desktop-only{display:inline-flex;}
#content{flex:1;overflow-y:auto;padding:28px 32px;-webkit-overflow-scrolling:touch;}
#content::-webkit-scrollbar{width:4px;}
#content::-webkit-scrollbar-thumb{background:var(--border-em);border-radius:3px;}

/* ── Loading ── */
#loading-screen{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:200;}
#loading-screen .l-logo{font-family:var(--mono);font-size:20px;color:var(--accent);font-weight:600;}
.spinner{width:20px;height:20px;border:2px solid var(--border-em);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ── Welcome ── */
#welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:14px;opacity:0.4;}
#welcome .wicon{font-size:36px;}
#welcome p{font-size:13px;color:var(--muted);text-align:center;max-width:260px;line-height:1.6;}

/* ── Folder view ── */
.folder-id{font-family:var(--mono);font-size:22px;font-weight:600;color:var(--accent-text);margin-bottom:2px;}
.folder-title-text{font-size:14px;color:var(--muted);margin-bottom:16px;}
.folder-actions{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:28px;}
.children-list{display:flex;flex-direction:column;gap:6px;}
.child-card{background:var(--card);border:0.5px solid var(--border);border-radius:var(--radius);padding:13px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:border-color .15s;}
.child-card:hover{border-color:var(--border-em);}
.child-card .c-id{font-family:var(--mono);font-size:13px;color:var(--accent-text);flex-shrink:0;min-width:64px;}
.child-card .c-title{font-size:13px;color:var(--muted);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.child-card .c-meta{font-size:11px;color:var(--hint);flex-shrink:0;}
.child-card .c-arrow{color:var(--hint);font-size:13px;flex-shrink:0;}

/* ── Inline add form ── */
.inline-form{background:var(--card);border:0.5px solid var(--accent);border-radius:var(--radius-lg);padding:20px 22px;margin-bottom:20px;}
.inline-form h3{font-size:13px;font-weight:500;color:var(--accent-text);margin-bottom:16px;}
.if-row{margin-bottom:12px;}
.if-row label{display:block;font-size:10px;text-transform:uppercase;letter-spacing:0.07em;color:var(--hint);margin-bottom:5px;}
.if-row input{width:100%;padding:9px 12px;border:0.5px solid var(--border-em);border-radius:var(--radius);background:var(--surface);color:var(--text);font-size:13px;font-family:var(--sans);outline:none;}
.if-row input:focus{border-color:var(--accent);}
.if-actions{display:flex;gap:8px;margin-top:16px;}
.if-save{padding:8px 20px;border-radius:var(--radius);border:none;background:var(--accent);cursor:pointer;font-size:13px;color:#1a1200;font-family:var(--sans);font-weight:600;}
.if-cancel{padding:8px 16px;border-radius:var(--radius);border:0.5px solid var(--border-em);background:transparent;cursor:pointer;font-size:13px;color:var(--muted);font-family:var(--sans);}

/* ── Entry topbar ── */
.entry-topbar{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;gap:12px;}
.entry-meta{min-width:0;}
.entry-id{font-family:var(--mono);font-size:22px;font-weight:600;color:var(--accent-text);}
.entry-title-disp{font-size:14px;color:var(--muted);margin-top:3px;}
.entry-actions{display:flex;gap:8px;align-items:center;flex-shrink:0;}
.btn-sm{padding:6px 12px;border-radius:var(--radius);border:0.5px solid var(--border-em);background:var(--card);cursor:pointer;font-size:12px;color:var(--muted);font-family:var(--sans);}
.btn-sm:hover{color:var(--text);}
.btn-sm.danger:hover{color:var(--danger);border-color:var(--danger);}
.btn-sm.primary{color:var(--accent-text);border-color:var(--accent);background:var(--accent-dim);}
.btn-sm.primary:hover{background:rgba(224,152,64,0.22);}

/* ── Tags ── */
.tags-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:18px;}
.tag{background:var(--tag-bg);color:var(--tag-text);font-size:11px;padding:3px 10px;border-radius:20px;font-weight:500;}

/* ── Unified content block (view mode) ── */
.content-block{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:0;margin-bottom:18px;font-family:var(--mono);font-size:13px;line-height:1.85;overflow:hidden;}
.content-block-inner{padding:16px 20px;white-space:pre-wrap;word-break:break-word;}
.copy-bar{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;border-top:0.5px solid var(--border);background:var(--card2);}
.copy-bar span{font-size:10px;color:var(--hint);}
.copy-btn{border:0.5px solid var(--border);border-radius:var(--radius);background:var(--card);cursor:pointer;font-size:11px;color:var(--hint);padding:4px 12px;font-family:var(--sans);}
.copy-btn:hover{color:var(--accent-text);border-color:var(--accent);}

/* ── Syntax highlighting ── */
.syn-prompt{color:var(--syn-prompt);font-weight:600;}
.syn-output{color:var(--syn-output);}
.syn-comment{color:var(--syn-comment);font-style:italic;}
.syn-keyword{color:var(--syn-keyword);}
.syn-bold{font-weight:700;color:var(--text);}

/* ── Images in view ── */
.images-section{margin-bottom:18px;}
.field-label{font-size:10px;text-transform:uppercase;letter-spacing:0.09em;color:var(--hint);margin-bottom:8px;}
.img-grid{display:flex;flex-wrap:wrap;gap:10px;margin-top:8px;}
.img-thumb{position:relative;border-radius:var(--radius);border:0.5px solid var(--border);overflow:hidden;cursor:zoom-in;}
.img-thumb img{display:block;max-width:min(360px,100%);max-height:260px;object-fit:cover;}
.img-del{position:absolute;top:5px;right:5px;background:rgba(0,0,0,0.75);border:none;border-radius:var(--radius);cursor:pointer;font-size:11px;color:#fff;padding:3px 8px;display:none;}
.img-thumb:hover .img-del{display:block;}
.img-drop-zone{border:1.5px dashed var(--border-em);border-radius:var(--radius);padding:20px 16px;text-align:center;cursor:pointer;font-size:12px;color:var(--hint);margin-top:8px;position:relative;transition:border-color .15s,color .15s;}
.img-drop-zone:hover,.img-drop-zone.drag-over{border-color:var(--accent);color:var(--accent-text);}
.img-drop-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;}
.img-caption{font-size:11px;color:var(--hint);margin-top:4px;}

/* ── Editor ── */
.entry-editor{width:100%;}
.ee-row{margin-bottom:18px;}
.ee-label{font-size:10px;text-transform:uppercase;letter-spacing:0.09em;color:var(--hint);margin-bottom:6px;display:flex;align-items:center;gap:8px;}
.ee-hint{font-size:10px;color:var(--hint);font-weight:400;text-transform:none;letter-spacing:0;}
.ee-input{width:100%;padding:10px 12px;border:0.5px solid var(--border-em);border-radius:var(--radius);background:var(--surface);color:var(--text);font-size:14px;font-family:var(--sans);outline:none;}
.ee-input:focus{border-color:var(--accent);}
/* unified textarea - auto-grows via JS */
.ee-unified{width:100%;padding:16px 18px;border:0.5px solid var(--border-em);border-radius:var(--radius-lg);background:var(--surface);color:var(--text);font-size:13px;font-family:var(--mono);outline:none;resize:none;line-height:1.85;min-height:300px;overflow-y:hidden;}
.ee-unified:focus{border-color:var(--accent);}
.ee-tags-input{font-family:var(--sans);}
.autosave-bar{display:flex;align-items:center;gap:10px;padding:12px 0 4px;border-top:0.5px solid var(--border);margin-top:8px;}
.ee-save-btn{padding:9px 24px;border-radius:var(--radius);border:none;background:var(--accent);cursor:pointer;font-size:13px;color:#1a1200;font-family:var(--sans);font-weight:600;}
.ee-save-btn:hover{opacity:0.9;}
.ee-discard-btn{padding:9px 16px;border-radius:var(--radius);border:0.5px solid var(--border-em);background:transparent;cursor:pointer;font-size:13px;color:var(--muted);font-family:var(--sans);}
.ee-discard-btn:hover{color:var(--text);}
.autosave-hint{font-size:11px;color:var(--hint);}
.autosave-hint.saved{color:var(--success);}

/* ── Lightbox ── */
#lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:999;align-items:center;justify-content:center;padding:16px;}
#lightbox.open{display:flex;}
#lightbox img{max-width:100%;max-height:100%;border-radius:var(--radius-lg);object-fit:contain;}
#lightbox-close{position:fixed;top:16px;right:16px;background:var(--card2);border:0.5px solid var(--border-em);border-radius:var(--radius);color:var(--muted);cursor:pointer;font-size:13px;padding:7px 14px;font-family:var(--sans);}

/* ── Toast ── */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--card2);border:0.5px solid var(--accent);border-radius:var(--radius);padding:8px 18px;font-size:12px;color:var(--accent-text);z-index:9999;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap;}
#toast.show{opacity:1;}

/* ── Mobile ── */
@media(max-width:640px){
  #hamburger{display:block;}
  .tagline,.desktop-only{display:none!important;}
  #sync-label{display:none;}
  #sidebar{position:fixed;left:0;top:var(--nav-h);bottom:0;z-index:40;transform:translateX(-100%);width:min(300px,85vw);box-shadow:4px 0 24px rgba(0,0,0,0.5);}
  #sidebar.open{transform:translateX(0);}
  #sidebar-overlay{display:block;opacity:0;pointer-events:none;transition:opacity .25s;}
  #sidebar-overlay.open{opacity:1;pointer-events:all;}
  #content{padding:16px;}
}
</style>
</head>
<body>
<div id="loading-screen">
  <div class="l-logo">⌨ cmdref</div>
  <div class="spinner"></div>
</div>
<div id="topnav">
  <button id="hamburger" onclick="toggleSidebar()">☰</button>
  <span class="logo">⌨ cmdref</span>
  <span class="tagline">command reference</span>
  <div class="spacer"></div>
  <div id="sync-status"><div id="sync-dot"></div><span id="sync-label">–</span></div>
  <button class="nav-btn desktop-only" onclick="importData()">↑ Import</button>
  <button class="nav-btn desktop-only" onclick="exportData()">↓ Export</button>
</div>
<div id="layout">
  <div id="sidebar-overlay" onclick="closeSidebar()"></div>
  <div id="sidebar">
    <div id="search-wrap"><input id="search" type="text" placeholder="Search…" oninput="filterTree(this.value)"/></div>
    <div id="sort-bar">
      <label>Sort:</label>
      <button class="sort-btn active" id="sb-created" onclick="setSort('created')">Created</button>
      <button class="sort-btn" id="sb-modified" onclick="setSort('modified')">Modified</button>
      <button class="sort-btn" id="sb-alpha" onclick="setSort('alpha')">A–Z</button>
      <button class="sort-btn" id="sb-dir" onclick="setSort('dir')">↑ Asc</button>
    </div>
    <div id="tree"></div>
    <div id="sidebar-actions">
      <button class="btn-add-sec desktop-only" onclick="showAddSectionForm()">＋ Add section</button>
    </div>
    <div id="sidebar-footer"></div>
  </div>
  <div id="main">
    <div id="breadbar"><div id="breadcrumb">select a task</div></div>
    <div id="content">
      <div id="welcome"><div class="wicon">⌨</div><p>Select a task from the sidebar or add a new section to get started.</p></div>
    </div>
  </div>
</div>
<div id="lightbox" onclick="closeLightbox()">
  <button id="lightbox-close" onclick="closeLightbox()">✕ close</button>
  <img id="lightbox-img" src="" alt=""/>
</div>
<div id="toast"></div>
<input type="file" id="import-file" accept=".json" style="display:none" onchange="handleImport(event)"/>

<script>
/* ── Supabase ── */
const SB_URL='https://raakpyeidaavvfevfpjm.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJhYWtweWVpZGFhdnZmZXZmcGptIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyODMxODQsImV4cCI6MjA4OTg1OTE4NH0.Zg-ZeBbOZRrSKQFK0jrBEWrgtU0Hw7LpvZFffYw3NDk';
const DB_ROW='main';

async function sbFetch(path,opts={}){
  const res=await fetch(`${SB_URL}/rest/v1${path}`,{...opts,headers:{'apikey':SB_KEY,'Authorization':`Bearer ${SB_KEY}`,'Content-Type':'application/json','Prefer':'resolution=merge-duplicates',...(opts.headers||{})}});
  if(!res.ok){const t=await res.text();throw new Error(t);}
  const ct=res.headers.get('content-type')||'';
  return ct.includes('json')?res.json():null;
}
async function loadFromDB(){
  const rows=await sbFetch(`/entries?id=eq.${DB_ROW}&select=data`);
  return(rows&&rows.length>0)?rows[0].data:{sections:[]};
}
let saveTimer=null;
function persist(){
  setSyncStatus('saving');
  clearTimeout(saveTimer);
  saveTimer=setTimeout(async()=>{
    try{await sbFetch('/entries',{method:'POST',body:JSON.stringify({id:DB_ROW,data:db,updated_at:new Date().toISOString()})});setSyncStatus('ok');}
    catch(e){setSyncStatus('err');showToast('Save failed — check connection');}
  },800);
}
function setSyncStatus(s){
  document.getElementById('sync-dot').className=s;
  document.getElementById('sync-label').textContent=s==='ok'?'saved':s==='saving'?'saving…':'error';
}

/* ── State ── */
let db={sections:[]};
let activePath=[];
let filterText='';
let openNodes=new Set();
let sortMode='created';
let sortAsc=true;
let editingEntryId=null;
let autoSaveTimer=null;
// Draft backup — survives accidental navigation
let draftBackup={};

/* ── Auto-save draft to localStorage (backup only, not primary storage) ── */
function saveDraft(entryId,content,tags,title){
  try{localStorage.setItem('draft_'+entryId,JSON.stringify({content,tags,title,ts:Date.now()}));}catch(e){}
}
function loadDraft(entryId){
  try{const d=localStorage.getItem('draft_'+entryId);return d?JSON.parse(d):null;}catch(e){return null;}
}
function clearDraft(entryId){
  try{localStorage.removeItem('draft_'+entryId);}catch(e){}
}

/* ── Sort ── */
function setSort(mode){
  if(sortMode===mode){sortAsc=!sortAsc;}else{sortMode=mode;sortAsc=true;}
  ['created','modified','alpha','dir'].forEach(m=>{const b=document.getElementById('sb-'+m);if(b)b.className='sort-btn'+(m===sortMode?' active':'');});
  document.getElementById('sb-dir').textContent=sortAsc?'↑ Asc':'↓ Desc';
  renderTree();
}
function sortNodes(nodes){
  return[...nodes].sort((a,b)=>{
    let c=0;
    if(sortMode==='alpha')c=(a.id||'').localeCompare(b.id||'',undefined,{numeric:true});
    else if(sortMode==='modified')c=(a.updatedAt||a.createdAt||'').localeCompare(b.updatedAt||b.createdAt||'');
    else c=(a.createdAt||'').localeCompare(b.createdAt||'');
    return sortAsc?c:-c;
  });
}

/* ── Node helpers ── */
function findNode(id,nodes){for(const n of nodes){if(n.id===id)return n;if(n.children){const f=findNode(id,n.children);if(f)return f;}}return null;}
function getDepth(id,nodes,d=0){for(const n of nodes){if(n.id===id)return d;if(n.children){const r=getDepth(id,n.children,d+1);if(r!==-1)return r;}}return -1;}
function isLeaf(node){return!node.children;}
function countLeaves(node){if(isLeaf(node))return 1;return(node.children||[]).reduce((a,c)=>a+countLeaves(c),0);}
function totalLeaves(){return db.sections.reduce((a,c)=>a+countLeaves(c),0);}
function allTitles(excludeId){const t=[];function w(n){n.forEach(x=>{if(x.id!==excludeId)t.push(x.title.trim().toLowerCase());if(x.children)w(x.children);});}w(db.sections);return t;}
function buildBreadcrumbParts(targetId,nodes=db.sections,path=[]){
  for(const n of nodes){
    const cur=[...path,{id:n.id,title:n.title}];
    if(n.id===targetId)return cur;
    if(n.children){const r=buildBreadcrumbParts(targetId,n.children,cur);if(r)return r;}
  }
  return null;
}

/* ── Syntax highlighter ── */
function highlightContent(raw){
  if(!raw)return'';
  const lines=raw.split('\n');
  return lines.map(line=>{
    const escaped=escHtml(line);
    // Bold: **text**
    const withBold=escaped.replace(/\*\*(.+?)\*\*/g,'<span class="syn-bold">$1</span>');
    // Prompt line: ends with # or has Router# ASA# hostname(config)# etc.
    if(/^[A-Za-z0-9_\-]+(\([^)]*\))*#/.test(line)){
      return`<span class="syn-prompt">${withBold}</span>`;
    }
    // Comment / separator line starting with !
    if(/^\s*!/.test(line)){
      return`<span class="syn-comment">${withBold}</span>`;
    }
    // show output lines (indented or starts with known output patterns)
    // We detect: lines that follow a prompt line or look like show output
    // (non-command lines that don't start with a keyword)
    return`<span class="syn-output">${withBold}</span>`;
  }).join('\n');
}

// Smarter highlighter that tracks context (after a # prompt = show output until next prompt)
function highlightSmart(raw){
  if(!raw)return'';
  const lines=raw.split('\n');
  let inShowOutput=false;
  return lines.map(line=>{
    const escaped=escHtml(line);
    // Apply **bold** first
    const withBold=escaped.replace(/\*\*(.+?)\*\*/g,'<span class="syn-bold">$1</span>');

    // Empty line
    if(line.trim()===''){inShowOutput=false;return withBold;}

    // ! comment
    if(/^\s*!/.test(line))return`<span class="syn-comment">${withBold}</span>`;

    // Prompt line: word(optionalcontext)# or word# — marks start of a command
    if(/^[A-Za-z0-9_\-]+(\([^)]*\))*#\s/.test(line)||/^[A-Za-z0-9_\-]+(\([^)]*\))*#$/.test(line)){
      inShowOutput=true; // lines after this prompt are show output until next prompt
      return`<span class="syn-prompt">${withBold}</span>`;
    }

    // If we're after a prompt line, this is show output
    if(inShowOutput){
      // But if it looks like a config command (no leading spaces, starts with keyword), treat as config
      if(/^(interface|ip |ipv6|router |access-list|route |nat |object |policy|service|crypto|tunnel|network|subnet|host|range|no |default |permit |deny |class |description|shutdown|bandwidth|logging|snmp|username|password|enable|aaa |ldap|http|ssh|telnet|ftp|ntp|dns|domain|hostname|version|boot|memory|flash|disk|vlan|spanning|port|channel|lacp|vpc|hsrp|vrrp|glbp|ospf|eigrp|bgp|rip|static|set |match |call |dial|isdn|frame|atm|ppp|serial|ethernet|gigabit|fastethernet|tengigabit|management|outside|inside|dmz)/i.test(line.trim())){
        return`<span class="syn-output">${withBold}</span>`;
      }
      return`<span class="syn-output">${withBold}</span>`;
    }

    // Default: plain text (notes/description content)
    return withBold;
  }).join('\n');
}

/* ── Tree render ── */
function renderTree(){
  const tree=document.getElementById('tree');
  const q=filterText.toLowerCase();
  tree.innerHTML='';
  function nodeMatches(n){
    if(isLeaf(n))return!q||n.id.includes(q)||n.title.toLowerCase().includes(q)||(n.content||'').toLowerCase().includes(q);
    return(n.children||[]).some(c=>nodeMatches(c));
  }
  function buildNode(node,depth){
    if(q&&!nodeMatches(node))return null;
    const leaf=isLeaf(node);
    const isOpen=q?true:openNodes.has(node.id);
    const isActive=activePath[activePath.length-1]===node.id;
    const wrap=document.createElement('div');
    wrap.className=`node lvl${depth+1}`+(!leaf&&isOpen?' open':'');
    const btn=document.createElement('button');
    btn.className='node-btn'+(isActive?' active':'');
    if(!leaf){const ch=document.createElement('span');ch.className='chevron';ch.textContent='▶';btn.appendChild(ch);}
    else{const d=document.createElement('span');d.className='node-dot'+(node.content||node.images?.length?' filled':'');btn.appendChild(d);}
    const idS=document.createElement('span');idS.className='node-id';idS.style.fontSize=depth===0?'13px':'12px';idS.textContent=node.id;btn.appendChild(idS);
    const lblS=document.createElement('span');lblS.className='node-label';lblS.style.cssText='font-size:11px;color:var(--hint);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;';lblS.textContent=node.title;btn.appendChild(lblS);
    if(!leaf){const bg=document.createElement('span');bg.className='node-badge';bg.textContent=countLeaves(node);btn.appendChild(bg);}
    btn.onclick=()=>{
      if(leaf){selectEntry(node.id);closeSidebar();}
      else{
        if(openNodes.has(node.id))openNodes.delete(node.id);else openNodes.add(node.id);
        activePath=buildBreadcrumbParts(node.id)?.map(p=>p.id)||[node.id];
        renderTree();showFolderView(node.id);
      }
    };
    wrap.appendChild(btn);
    if(!leaf&&node.children){
      const cc=document.createElement('div');cc.className=`lvl${depth+1}-children`;
      sortNodes(node.children).forEach(child=>{const el=buildNode(child,depth+1);if(el)cc.appendChild(el);});
      wrap.appendChild(cc);
    }
    return wrap;
  }
  sortNodes(db.sections).forEach(sec=>{const el=buildNode(sec,0);if(el)tree.appendChild(el);});
  const sf=document.getElementById('sidebar-footer');
  if(sf)sf.textContent=`${db.sections.length} sections · ${totalLeaves()} tasks`;
}

function setBreadcrumb(nodeId){

  document.getElementById('breadcrumb').innerHTML=parts.map((p,i)=>
    i<parts.length-1?`<span style="cursor:pointer;color:var(--muted)" onclick="showFolderView('${esc(p.id)}')">${esc(p.id)}</span> <span style="color:var(--hint);margin:0 4px;">/</span>`

  ).join('');
}

/* ── Folder view ── */
function showFolderView(nodeId){
  const node=findNode(nodeId,db.sections);if(!node||isLeaf(node))return;
  const depth=getDepth(nodeId,db.sections);
  activePath=buildBreadcrumbParts(nodeId)?.map(p=>p.id)||[nodeId];
  editingEntryId=null;
  setBreadcrumb(nodeId);renderTree();
  const childItems=sortNodes(node.children||[]).map(c=>{
    const meta=isLeaf(c)?(c.tags||[]).slice(0,2).join(', ')||'':(`${countLeaves(c)} tasks`);
    return`<div class="child-card" onclick="${isLeaf(c)?`selectEntry('${esc(c.id)}')`:`showFolderView('${esc(c.id)}')`}">
      <span class="c-id">${esc(c.id)}</span><span class="c-title">${esc(c.title)}</span>
      <span class="c-meta">${esc(meta)}</span><span class="c-arrow">›</span></div>`;
  }).join('');
  const addBtns=[
    depth===0?`<button class="btn-sm primary desktop-only" onclick="showAddTaskForm('${esc(nodeId)}','subsection')">+ Add subsection</button>`:'',
    depth===1?`<button class="btn-sm primary desktop-only" onclick="showAddTaskForm('${esc(nodeId)}','task')">+ Add task</button>`:'',
    `<button class="btn-sm desktop-only" onclick="showRenameForm('${esc(nodeId)}')">Rename</button>`,
    `<button class="btn-sm danger desktop-only" onclick="deleteNode('${esc(nodeId)}')">Delete</button>`
  ].join('');
  document.getElementById('content').innerHTML=`
    <div class="folder-id">${esc(node.id)}</div>
    <div class="folder-title-text">${esc(node.title)}</div>
    <div class="folder-actions">${addBtns}</div>
    <div id="inline-form-area"></div>
    <div class="children-list">${childItems||'<div style="color:var(--hint);font-size:13px;padding:20px 0;">No items yet.</div>'}</div>`;
  document.getElementById('content').scrollTop=0;
}

/* ── Submit ── */
function submitAddNode(parentId,depth){
  const id=document.getElementById('f-nid').value.trim();
  const title=document.getElementById('f-ntitle').value.trim();
  if(!id){showToast('ID is required');document.getElementById('f-nid').focus();return;}
  if(findNode(id,db.sections)){showToast('That ID already exists.');return;}
  if(title&&allTitles().includes(title.toLowerCase())){showToast(`"${title}" is already used.`);return;}
  const now=new Date().toISOString();
  const newNode={id,title:title||id,children:[],createdAt:now,updatedAt:now};
  if(!parentId){db.sections.push(newNode);}
  else{const parent=findNode(parentId,db.sections);if(!parent)return;if(!parent.children)parent.children=[];parent.children.push(newNode);}
  persist();openNodes.add(id);if(parentId)openNodes.add(parentId);
  activePath=parentId?[...buildBreadcrumbParts(parentId).map(p=>p.id),id]:[id];
  renderTree();showFolderView(id);
}

function submitAddTask(parentId){
  const id=document.getElementById('f-nid').value.trim();
  const title=document.getElementById('f-ntitle').value.trim();
  if(!id){showToast('ID is required');document.getElementById('f-nid').focus();return;}
  if(findNode(id,db.sections)){showToast('That ID already exists.');return;}
  if(title&&allTitles().includes(title.toLowerCase())){showToast(`"${title}" is already used.`);return;}
  const now=new Date().toISOString();
  const parent=findNode(parentId,db.sections);if(!parent)return;
  // New unified model: single 'content' field + tags + images
  const entry={id,title:title||id,content:'',tags:[],images:[],createdAt:now,updatedAt:now};
  if(!parent.children)parent.children=[];
  parent.children.push(entry);
  persist();openNodes.add(parentId);
  activePath=[...buildBreadcrumbParts(parentId).map(p=>p.id),id];
  renderTree();selectEntry(id);
}

function submitRename(nodeId){
  const node=findNode(nodeId,db.sections);if(!node)return;
  const newTitle=document.getElementById('f-ntitle').value.trim();
  if(newTitle&&newTitle.toLowerCase()!==node.title.toLowerCase()&&allTitles(nodeId).includes(newTitle.toLowerCase())){showToast(`"${newTitle}" is already used.`);return;}
  node.title=newTitle||node.title;node.updatedAt=new Date().toISOString();
  persist();renderTree();showFolderView(nodeId);
}

/* ── Migration: old entries (commands+notes) → new unified content ── */
function migrateEntry(entry){
  if(entry.content!==undefined)return entry; // already migrated
  const parts=[];
  if(entry.commands&&entry.commands.trim())parts.push(entry.commands.trim());
  if(entry.notes&&entry.notes.trim()){if(parts.length)parts.push('');parts.push(entry.notes.trim());}
  entry.content=parts.join('\n');
  delete entry.commands;delete entry.notes;
  return entry;
}

/* ── Select entry ── */
function selectEntry(entryId){
  const node=findNode(entryId,db.sections);if(!node)return;
  migrateEntry(node);
  activePath=buildBreadcrumbParts(entryId).map(p=>p.id);
  openNodes.add(activePath[0]);if(activePath[1])openNodes.add(activePath[1]);
  editingEntryId=null;
  renderTree();renderEntryView(entryId);
}

/* ── Save entry ── */

  const entry=findNode(entryId,db.sections);if(!entry)return;

  if(newTitle&&newTitle.toLowerCase()!==entry.title.toLowerCase()&&allTitles(entryId).includes(newTitle.toLowerCase())){showToast(`"${newTitle}" is already used.`);return;}
  entry.title=newTitle||entry.title;

}

/* ── Delete ── */
function deleteNode(nodeId){
  const node=findNode(nodeId,db.sections);
  if(!confirm(`Delete ${isLeaf(node)?`task ${nodeId}`:`section ${nodeId} and all its contents`}?`))return;
  function removeFrom(nodes){const idx=nodes.findIndex(n=>n.id===nodeId);if(idx!==-1){nodes.splice(idx,1);return true;}for(const n of nodes){if(n.children&&removeFrom(n.children))return true;}return false;}
  removeFrom(db.sections);
  persist();activePath=[];editingEntryId=null;openNodes.delete(nodeId);renderTree();
  document.getElementById('content').innerHTML=`<div id="welcome"><div class="wicon">⌨</div><p>Deleted.</p></div>`;
  document.getElementById('breadcrumb').textContent='select a task';
}

/* ── Copy content ── */
function copyContent(entryId,btn){
  const entry=findNode(entryId,db.sections);if(!entry?.content)return;
  navigator.clipboard.writeText(entry.content).then(()=>{
    btn.textContent='Copied ✓';btn.style.color='var(--success)';
    setTimeout(()=>{btn.textContent='Copy all';btn.style.color='';},2000);
  }).catch(()=>{const ta=document.createElement('textarea');ta.value=entry.content;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);showToast('Copied ✓');});
}

/* ── Images — paste goes to image section, never to textarea ── */
document.addEventListener('paste',e=>{
  const entryId=activePath[activePath.length-1];if(!entryId)return;
  const entry=findNode(entryId,db.sections);if(!entry||!isLeaf(entry))return;
  const items=Array.from(e.clipboardData.items).filter(it=>it.type.startsWith('image/'));
  if(!items.length)return;
  // Always intercept image pastes — prevent them going into any textarea
  e.preventDefault();
  e.stopPropagation();
  if(!entry.images)entry.images=[];
  let pending=items.length;
  items.forEach(item=>{
    const reader=new FileReader();
    reader.onload=ev=>{
      entry.images.push({name:`pasted-${Date.now()}.png`,data:ev.target.result});
      if(--pending===0){
        persist();
        // Refresh image grid without losing textarea content
        if(editingEntryId===entryId){
          const grid=document.getElementById(`img-grid-${entryId}`);
          if(grid){
            grid.innerHTML=entry.images.map((img,i)=>`<div class="img-thumb"><img src="${img.data}" alt="${esc(img.name||'')}" onclick="openLightbox('${esc(entryId)}',${i})"/><button class="img-del" onclick="deleteImage('${esc(entryId)}',${i})">✕</button></div>`).join('');
          }
        }else{renderEntryView(entryId);}
        showToast('Image pasted ✓');
      }
    };
    reader.readAsDataURL(item.getAsFile());
  });
},true); // capture phase — fires before textarea gets it

function handleDrop(e,entryId){e.preventDefault();e.currentTarget.classList.remove('drag-over');processImages(Array.from(e.dataTransfer.files).filter(f=>f.type.startsWith('image/')),entryId);}
function handleFileInput(e,entryId){processImages(Array.from(e.target.files),entryId);}
function processImages(files,entryId){
  const entry=findNode(entryId,db.sections);if(!entry||!files.length)return;
  if(!entry.images)entry.images=[];
  let pending=files.length;
  files.forEach(file=>{
    const reader=new FileReader();
    reader.onload=ev=>{
      entry.images.push({name:file.name,data:ev.target.result});
      if(--pending===0){
        persist();
        if(editingEntryId===entryId){
          const grid=document.getElementById(`img-grid-${entryId}`);
          if(grid)grid.innerHTML=entry.images.map((img,i)=>`<div class="img-thumb"><img src="${img.data}" alt="${esc(img.name||'')}" onclick="openLightbox('${esc(entryId)}',${i})"/><button class="img-del" onclick="deleteImage('${esc(entryId)}',${i})">✕</button></div>`).join('');
        }else{renderEntryView(entryId);}
        showToast('Image saved ✓');
      }
    };
    reader.readAsDataURL(file);
  });
}
function deleteImage(entryId,idx){
  if(!confirm('Remove this image?'))return;
  const entry=findNode(entryId,db.sections);if(!entry?.images)return;
  entry.images.splice(idx,1);persist();
  if(editingEntryId===entryId){
    const grid=document.getElementById(`img-grid-${entryId}`);
    if(grid)grid.innerHTML=entry.images.map((img,i)=>`<div class="img-thumb"><img src="${img.data}" alt="${esc(img.name||'')}" onclick="openLightbox('${esc(entryId)}',${i})"/><button class="img-del" onclick="deleteImage('${esc(entryId)}',${i})">✕</button></div>`).join('');
  }else{renderEntryView(entryId);}
}

/* ── Lightbox ── */
function openLightbox(entryId,idx){const img=findNode(entryId,db.sections)?.images?.[idx];if(!img)return;document.getElementById('lightbox-img').src=img.data;document.getElementById('lightbox').classList.add('open');}
function closeLightbox(){document.getElementById('lightbox').classList.remove('open');}

/* ── Search / Sidebar ── */
function filterTree(q){filterText=q;renderTree();}
function toggleSidebar(){const sb=document.getElementById('sidebar'),ov=document.getElementById('sidebar-overlay');const o=sb.classList.toggle('open');ov.classList.toggle('open',o);}
function closeSidebar(){document.getElementById('sidebar').classList.remove('open');document.getElementById('sidebar-overlay').classList.remove('open');}

/* ── Export / Import ── */
function exportData(){const blob=new Blob([JSON.stringify(db,null,2)],{type:'application/json'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='cmdref-backup.json';a.click();URL.revokeObjectURL(url);}
function importData(){document.getElementById('import-file').click();}
function handleImport(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const parsed=JSON.parse(ev.target.result);
      if(!parsed.sections)throw new Error();
      if(confirm('Replace all current data with this backup?')){
        db=parsed;persist();activePath=[];openNodes.clear();editingEntryId=null;renderTree();
        document.getElementById('content').innerHTML=`<div id="welcome"><div class="wicon">⌨</div><p>Imported successfully.</p></div>`;
        document.getElementById('breadcrumb').textContent='select a task';
        showToast('Import successful ✓');
      }
    }catch{alert('Invalid backup file.');}
  };
  reader.readAsText(file);e.target.value='';
}

/* ── Helpers ── */
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2400);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function escHtml(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

/* ── Boot ── */
(async()=>{
  try{db=await loadFromDB();setSyncStatus('ok');}
  catch(e){setSyncStatus('err');showToast('Could not connect to database');db={sections:[]};}
  document.getElementById('loading-screen').style.display='none';
  renderTree();
})();
</script>
