<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="theme-color" content="#0f1117" />
<title>cmdref</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0f1117;
  --surface: #161a24;
  --card: #1c2130;
  --card2: #212636;
  --border: rgba(255,255,255,0.07);
  --border-em: rgba(255,255,255,0.13);
  --text: #e8eaf0;
  --muted: #8b90a0;
  --hint: #555b6e;
  --accent: #e09840;
  --accent-dim: rgba(224,152,64,0.12);
  --accent-text: #f0b860;
  --tag-bg: rgba(55,138,221,0.15);
  --tag-text: #7db8f0;
  --danger: #e24b4a;
  --success: #4caf7d;
  --mono: 'Cascadia Code','Fira Code','Consolas',monospace;
  --sans: 'Segoe UI',system-ui,sans-serif;
  --radius: 8px;
  --radius-lg: 12px;
  --nav-h: 52px;
  --tab-h: 56px;
}

html, body { height: 100%; overflow: hidden; }
body { font-family: var(--sans); background: var(--bg); color: var(--text); display: flex; flex-direction: column; }

/* ── Top nav ── */
#topnav {
  height: var(--nav-h); flex-shrink: 0;
  display: flex; align-items: center; gap: 10px;
  padding: 0 16px;
  border-bottom: 0.5px solid var(--border);
  background: var(--surface);
  position: relative; z-index: 50;
}
#hamburger {
  display: none; border: none; background: none; cursor: pointer;
  color: var(--muted); font-size: 20px; padding: 4px 6px; line-height: 1;
}
.logo { font-family: var(--mono); font-size: 14px; color: var(--accent); font-weight: 600; letter-spacing: 0.05em; }
.tagline { font-size: 11px; color: var(--hint); }
.spacer { flex: 1; }
.nav-btn {
  padding: 5px 11px; border-radius: var(--radius);
  border: 0.5px solid var(--border-em);
  background: transparent; cursor: pointer;
  font-size: 11px; color: var(--muted); font-family: var(--sans);
  white-space: nowrap;
}
.nav-btn:hover { color: var(--accent); border-color: var(--accent); }

/* ── Layout ── */
#layout { display: flex; flex: 1; overflow: hidden; position: relative; }

/* ── Sidebar ── */
#sidebar {
  width: 260px; flex-shrink: 0;
  border-right: 0.5px solid var(--border);
  background: var(--surface);
  display: flex; flex-direction: column;
  overflow: hidden;
  transition: transform 0.25s ease;
}
#search-wrap { padding: 10px 12px; border-bottom: 0.5px solid var(--border); }
#search {
  width: 100%; padding: 8px 10px;
  border: 0.5px solid var(--border-em); border-radius: var(--radius);
  background: var(--card); color: var(--text);
  font-size: 13px; font-family: var(--sans); outline: none;
}
#search:focus { border-color: var(--accent); }
#tree { flex: 1; overflow-y: auto; padding: 6px 0; -webkit-overflow-scrolling: touch; }
#tree::-webkit-scrollbar { width: 3px; }
#tree::-webkit-scrollbar-thumb { background: var(--border-em); border-radius: 2px; }

.sec-group {}
.sec-btn {
  width: 100%; text-align: left; border: none; background: none; cursor: pointer;
  padding: 8px 14px; display: flex; align-items: center; gap: 7px;
  color: var(--text); font-size: 13px; font-weight: 500;
}
.sec-btn:active { background: var(--card); }
.chevron { font-size: 9px; color: var(--hint); transition: transform .15s; display: inline-block; }
.sec-btn.open .chevron { transform: rotate(90deg); }
.sec-title-text { color: var(--muted); font-size: 11px; font-weight: 400; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.badge { font-size: 10px; background: var(--card2); border: 0.5px solid var(--border); border-radius: 10px; padding: 1px 6px; color: var(--hint); flex-shrink: 0; }
.sub-list { display: none; }
.sub-list.open { display: block; }
.sub-btn {
  width: 100%; text-align: left; border: none; background: none; cursor: pointer;
  padding: 7px 14px 7px 28px; font-size: 12px; color: var(--muted);
  display: flex; align-items: center; gap: 7px;
}
.sub-btn:active { background: var(--card); }
.sub-btn.active { color: var(--accent-text); background: var(--accent-dim); }
.dot { width: 5px; height: 5px; border-radius: 50%; background: var(--hint); flex-shrink: 0; }
.sub-btn.filled .dot { background: var(--accent); }
.sub-id { font-family: var(--mono); font-size: 11px; }
.sub-label { font-size: 11px; color: var(--hint); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 120px; }
.sub-btn.active .sub-label { color: var(--muted); }
.btn-add-sec {
  width: 100%; text-align: left; border: none; background: none; cursor: pointer;
  padding: 10px 14px; font-size: 12px; color: var(--hint);
  display: flex; align-items: center; gap: 6px;
  border-top: 0.5px solid var(--border);
}
.btn-add-sec:hover { color: var(--accent); }
#sidebar-footer { padding: 7px 14px; border-top: 0.5px solid var(--border); font-size: 10px; color: var(--hint); }

/* ── Sidebar overlay (mobile) ── */
#sidebar-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.55); z-index: 30;
}

/* ── Main ── */
#main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

#breadbar {
  padding: 9px 16px; border-bottom: 0.5px solid var(--border);
  background: var(--surface);
  display: flex; align-items: center; gap: 10px; flex-shrink: 0;
  min-height: 44px;
}
#breadcrumb { font-size: 12px; color: var(--hint); flex: 1; font-family: var(--mono); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
#breadcrumb .hi { color: var(--accent-text); }
#btn-add-entry {
  padding: 6px 14px; border-radius: var(--radius);
  border: 0.5px solid var(--accent); background: var(--accent-dim);
  cursor: pointer; font-size: 12px; color: var(--accent-text); font-family: var(--sans);
  display: none; white-space: nowrap; flex-shrink: 0;
}
#btn-add-entry:active { background: rgba(224,152,64,0.22); }

#content { flex: 1; overflow-y: auto; padding: 20px 18px; -webkit-overflow-scrolling: touch; }
#content::-webkit-scrollbar { width: 4px; }
#content::-webkit-scrollbar-thumb { background: var(--border-em); border-radius: 3px; }

/* ── Welcome ── */
#welcome { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 14px; opacity: 0.4; }
#welcome .wicon { font-size: 36px; }
#welcome p { font-size: 13px; color: var(--muted); text-align: center; max-width: 260px; line-height: 1.6; }

/* ── Entry ── */
.entry-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 16px; gap: 10px; }
.entry-id { font-family: var(--mono); font-size: 22px; font-weight: 600; color: var(--accent-text); }
.entry-title-disp { font-size: 13px; color: var(--muted); margin-top: 3px; line-height: 1.4; }
.entry-actions { display: flex; gap: 8px; align-items: center; flex-shrink: 0; }
.btn-sm {
  padding: 6px 12px; border-radius: var(--radius); border: 0.5px solid var(--border-em);
  background: var(--card); cursor: pointer; font-size: 12px; color: var(--muted);
  font-family: var(--sans);
}
.btn-sm:active { opacity: 0.7; }
.btn-sm.danger:active { color: var(--danger); }
.btn-sm.primary { color: var(--accent-text); border-color: var(--accent); background: var(--accent-dim); }

.field-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.09em; color: var(--hint); margin-bottom: 7px; }
.cmd-block {
  background: var(--surface); border: 0.5px solid var(--border);
  border-radius: var(--radius); padding: 14px 16px; margin-bottom: 18px;
  font-family: var(--mono); font-size: 13px; line-height: 1.75;
  white-space: pre-wrap; word-break: break-all; color: var(--accent-text);
  position: relative;
}
.copy-btn {
  position: absolute; top: 8px; right: 8px;
  border: 0.5px solid var(--border); border-radius: var(--radius);
  background: var(--card2); cursor: pointer; font-size: 11px; color: var(--hint);
  padding: 4px 10px; font-family: var(--sans);
}
.copy-btn:active { color: var(--accent-text); }
.notes-block {
  background: var(--card); border: 0.5px solid var(--border);
  border-left: 2px solid var(--accent); border-radius: var(--radius);
  padding: 12px 16px; font-size: 13px; line-height: 1.75; color: var(--text);
  white-space: pre-wrap; margin-bottom: 18px;
}
.tags-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
.tag { background: var(--tag-bg); color: var(--tag-text); font-size: 11px; padding: 3px 10px; border-radius: 20px; font-weight: 500; }

/* ── Images ── */
.images-section { margin-bottom: 18px; }
.img-grid { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 8px; }
.img-thumb {
  position: relative; border-radius: var(--radius);
  border: 0.5px solid var(--border); overflow: hidden; cursor: zoom-in;
}
.img-thumb img { display: block; max-width: min(280px, 100%); max-height: 200px; object-fit: cover; }
.img-del {
  position: absolute; top: 5px; right: 5px;
  background: rgba(0,0,0,0.75); border: none;
  border-radius: var(--radius); cursor: pointer; font-size: 11px;
  color: #fff; padding: 3px 8px;
}
.img-drop-zone {
  border: 1.5px dashed var(--border-em); border-radius: var(--radius);
  padding: 20px 16px; text-align: center; cursor: pointer;
  font-size: 12px; color: var(--hint); margin-top: 8px;
  position: relative;
}
.img-drop-zone:active, .img-drop-zone.drag-over { border-color: var(--accent); color: var(--accent-text); }
.img-drop-zone input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
.img-caption { font-size: 11px; color: var(--hint); margin-top: 4px; }

/* ── Lightbox ── */
#lightbox {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.92); z-index: 999;
  align-items: center; justify-content: center;
  padding: 16px;
}
#lightbox.open { display: flex; }
#lightbox img { max-width: 100%; max-height: 100%; border-radius: var(--radius-lg); object-fit: contain; }
#lightbox-close {
  position: fixed; top: 16px; right: 16px;
  background: var(--card2); border: 0.5px solid var(--border-em);
  border-radius: var(--radius); color: var(--muted); cursor: pointer;
  font-size: 13px; padding: 7px 14px; font-family: var(--sans);
}

/* ── Modal ── */
#overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.65); z-index: 500;
  align-items: flex-end; justify-content: center;
  padding-bottom: env(safe-area-inset-bottom);
}
#overlay.open { display: flex; }
.modal {
  background: var(--card); border: 0.5px solid var(--border-em);
  border-radius: var(--radius-lg) var(--radius-lg) 0 0;
  padding: 22px 20px 32px;
  width: 100%; max-width: 600px; max-height: 92vh; overflow-y: auto;
}
.modal::-webkit-scrollbar { width: 3px; }
.modal::-webkit-scrollbar-thumb { background: var(--border-em); }
.modal-handle { width: 36px; height: 4px; background: var(--border-em); border-radius: 2px; margin: 0 auto 18px; }
.modal h2 { font-size: 14px; font-weight: 500; color: var(--text); margin-bottom: 18px; }
.form-row { margin-bottom: 14px; }
.form-row label { display: block; font-size: 11px; color: var(--muted); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.06em; }
.form-row input, .form-row textarea {
  width: 100%; padding: 10px 12px;
  border: 0.5px solid var(--border-em); border-radius: var(--radius);
  background: var(--surface); color: var(--text);
  font-size: 14px; font-family: var(--sans); outline: none;
  -webkit-appearance: none;
}
.form-row textarea { font-family: var(--mono); resize: vertical; min-height: 100px; line-height: 1.65; font-size: 13px; }
.form-row input:focus, .form-row textarea:focus { border-color: var(--accent); }
.form-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 18px; }
.btn-cancel { padding: 10px 18px; border-radius: var(--radius); border: 0.5px solid var(--border-em); background: transparent; cursor: pointer; font-size: 13px; color: var(--muted); font-family: var(--sans); }
.btn-save { padding: 10px 22px; border-radius: var(--radius); border: none; background: var(--accent); cursor: pointer; font-size: 13px; color: #1a1200; font-family: var(--sans); font-weight: 600; }

.empty-msg { text-align: center; padding: 50px 20px; color: var(--hint); font-size: 13px; }
.empty-msg .hint2 { font-size: 11px; margin-top: 6px; }

/* ── Toast ── */
#toast {
  position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
  background: var(--card2); border: 0.5px solid var(--accent);
  border-radius: var(--radius); padding: 8px 18px;
  font-size: 12px; color: var(--accent-text); z-index: 9999;
  opacity: 0; transition: opacity .25s; pointer-events: none;
  white-space: nowrap;
}
#toast.show { opacity: 1; }

/* ── Mobile bottom tab bar ── */
#tab-bar {
  display: none;
  height: var(--tab-h); flex-shrink: 0;
  background: var(--surface); border-top: 0.5px solid var(--border);
  padding-bottom: env(safe-area-inset-bottom);
}

/* ── Responsive ── */
@media (max-width: 640px) {
  #hamburger { display: block; }
  .tagline { display: none; }
  #sidebar {
    position: fixed; left: 0; top: var(--nav-h); bottom: 0;
    z-index: 40; transform: translateX(-100%);
    width: min(300px, 85vw);
    box-shadow: 4px 0 24px rgba(0,0,0,0.5);
  }
  #sidebar.open { transform: translateX(0); }
  #sidebar-overlay { display: block; opacity: 0; pointer-events: none; transition: opacity .25s; }
  #sidebar-overlay.open { opacity: 1; pointer-events: all; }
  #btn-add-entry { font-size: 11px; padding: 6px 10px; }
  .entry-id { font-size: 18px; }
  .cmd-block { font-size: 12px; padding: 12px 12px 12px 12px; padding-right: 60px; }
  .copy-btn { font-size: 10px; padding: 3px 7px; }
  #overlay { align-items: flex-end; }
  .modal { border-radius: var(--radius-lg) var(--radius-lg) 0 0; }
}
</style>
</head>
<body>

<div id="topnav">
  <button id="hamburger" onclick="toggleSidebar()" aria-label="Menu">☰</button>
  <span class="logo">⌨ cmdref</span>
  <span class="tagline">command reference</span>
  <div class="spacer"></div>
  <button class="nav-btn" onclick="importData()">↑ Import</button>
  <button class="nav-btn" onclick="exportData()">↓ Export</button>
</div>

<div id="layout">
  <div id="sidebar-overlay" onclick="closeSidebar()"></div>
  <div id="sidebar">
    <div id="search-wrap">
      <input id="search" type="text" placeholder="Search tasks or commands…" oninput="filterTree(this.value)" />
    </div>
    <div id="tree"></div>
    <button class="btn-add-sec" onclick="openAddSectionModal()">＋ Add section</button>
    <div id="sidebar-footer"></div>
  </div>

  <div id="main">
    <div id="breadbar">
      <div id="breadcrumb">select a task</div>
      <button id="btn-add-entry" onclick="openAddEntryModal()">＋ Add task</button>
    </div>
    <div id="content">
      <div id="welcome">
        <div class="wicon">⌨</div>
        <p>Select a task from the sidebar, or add a new section to get started.</p>
      </div>
    </div>
  </div>
</div>

<div id="lightbox" onclick="closeLightbox()">
  <button id="lightbox-close" onclick="closeLightbox()">✕ close</button>
  <img id="lightbox-img" src="" alt="" />
</div>

<div id="overlay">
  <div class="modal" id="modal-body"></div>
</div>

<div id="toast"></div>
<input type="file" id="import-file" accept=".json" style="display:none" onchange="handleImport(event)" />

<script>
const STORAGE_KEY = 'cmdref_v2';

function loadData() {
  try { const r = localStorage.getItem(STORAGE_KEY); return r ? JSON.parse(r) : seedData(); }
  catch { return seedData(); }
}
function saveData(d) { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); }
function seedData() {
  return { sections: [{ id: '5.1', title: 'Example Section', entries: [{
    id: '5.1.1', title: 'Verify device baseline',
    commands: 'show version\nshow ip interface brief\nshow running-config',
    notes: 'Run these before making any changes to establish baseline state.',
    tags: ['verification', 'baseline'], images: []
  }]}]};
}

let db = loadData();
let activeSection = null;
let activeEntry = null;
let filterText = '';

function persist() { saveData(db); }

/* ── Sidebar toggle (mobile) ── */
function toggleSidebar() {
  const sb = document.getElementById('sidebar');
  const ov = document.getElementById('sidebar-overlay');
  const open = sb.classList.toggle('open');
  ov.classList.toggle('open', open);
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('open');
}

/* ── Tree ── */
function renderTree() {
  const tree = document.getElementById('tree');
  const q = filterText.toLowerCase();
  tree.innerHTML = '';
  let totEntries = 0;
  db.sections.forEach(sec => {
    const filtered = sec.entries.filter(e =>
      !q || e.id.includes(q) || e.title.toLowerCase().includes(q) ||
      (e.commands||'').toLowerCase().includes(q) ||
      sec.id.includes(q) || sec.title.toLowerCase().includes(q)
    );
    if (q && filtered.length === 0) return;
    totEntries += sec.entries.length;
    const grp = document.createElement('div');
    grp.className = 'sec-group';
    const isOpen = q ? true : (activeSection === sec.id);
    const btn = document.createElement('button');
    btn.className = 'sec-btn' + (activeSection === sec.id ? ' active' : '') + (isOpen ? ' open' : '');
    btn.innerHTML = `<span class="chevron">▶</span><span style="font-family:var(--mono);font-size:12px;">${esc(sec.id)}</span><span class="sec-title-text">${esc(sec.title)}</span><span class="badge">${sec.entries.length}</span>`;
    const list = document.createElement('div');
    list.className = 'sub-list' + (isOpen ? ' open' : '');
    btn.onclick = () => {
      const opening = !list.classList.contains('open');
      list.classList.toggle('open', opening);
      btn.classList.toggle('open', opening);
      if (opening) { activeSection = sec.id; renderTree(); }
    };
    grp.appendChild(btn);
    (q ? filtered : sec.entries).forEach(entry => {
      const sb = document.createElement('button');
      const filled = !!(entry.commands || (entry.images && entry.images.length));
      sb.className = 'sub-btn' + (activeEntry === entry.id ? ' active' : '') + (filled ? ' filled' : '');
      sb.innerHTML = `<span class="dot"></span><span class="sub-id">${esc(entry.id)}</span><span class="sub-label">${esc(entry.title)}</span>`;
      sb.onclick = () => { selectEntry(sec.id, entry.id); closeSidebar(); };
      list.appendChild(sb);
    });
    grp.appendChild(list);
    tree.appendChild(grp);
  });
  const sf = document.getElementById('sidebar-footer');
  if (sf) sf.textContent = `${db.sections.length} sections · ${totEntries} tasks`;
}

function selectEntry(secId, entryId) {
  activeSection = secId; activeEntry = entryId;
  renderTree(); renderEntry(secId, entryId);
}

/* ── Entry View ── */
function renderEntry(secId, entryId) {
  const sec = db.sections.find(s => s.id === secId);
  const entry = sec?.entries.find(e => e.id === entryId);
  const content = document.getElementById('content');
  const bc = document.getElementById('breadcrumb');
  const btnAdd = document.getElementById('btn-add-entry');
  bc.innerHTML = `${esc(sec.id)} <span style="color:var(--hint);margin:0 4px;">/</span> <span class="hi">${entry ? esc(entry.id) : '…'}</span>`;
  btnAdd.style.display = '';
  if (!entry) { content.innerHTML = `<div class="empty-msg">Not found.</div>`; return; }

  const hasCmds = entry.commands && entry.commands.trim();
  const hasNotes = entry.notes && entry.notes.trim();
  const imgs = entry.images || [];

  content.innerHTML = `
    <div class="entry-header">
      <div style="min-width:0;">
        <div class="entry-id">${esc(entry.id)}</div>
        <div class="entry-title-disp">${esc(entry.title)}</div>
      </div>
      <div class="entry-actions">
        <button class="btn-sm primary" onclick="openEditModal('${esc(secId)}','${esc(entryId)}')">Edit</button>
        <button class="btn-sm danger" onclick="deleteEntry('${esc(secId)}','${esc(entryId)}')">Delete</button>
      </div>
    </div>

    ${(entry.tags||[]).length ? `<div class="tags-row">${entry.tags.map(t=>`<span class="tag">${esc(t)}</span>`).join('')}</div>` : ''}

    ${hasCmds ? `
      <div class="field-label">Commands</div>
      <div class="cmd-block">${esc(entry.commands)}<button class="copy-btn" onclick="copyCmd('${esc(secId)}','${esc(entryId)}',this)">copy</button></div>
    ` : ''}

    ${hasNotes ? `
      <div class="field-label">Notes</div>
      <div class="notes-block">${esc(entry.notes)}</div>
    ` : ''}

    <div class="images-section">
      <div class="field-label">Diagrams / Images</div>
      <div class="img-grid" id="img-grid-${esc(entryId)}">
        ${imgs.map((img,i) => `
          <div class="img-thumb">
            <img src="${img.data}" alt="${esc(img.name||'diagram')}" onclick="openLightbox('${esc(secId)}','${esc(entryId)}',${i})" />
            <button class="img-del" onclick="deleteImage('${esc(secId)}','${esc(entryId)}',${i})">✕</button>
          </div>
        `).join('')}
      </div>
      <div class="img-drop-zone" id="drop-${esc(entryId)}"
        ondragover="event.preventDefault();this.classList.add('drag-over')"
        ondragleave="this.classList.remove('drag-over')"
        ondrop="handleDrop(event,'${esc(secId)}','${esc(entryId)}')">
        <input type="file" accept="image/*" multiple onchange="handleFileInput(event,'${esc(secId)}','${esc(entryId)}')" />
        <div>📎 Drop images here or tap to upload</div>
        <div class="img-caption">PNG · JPG · SVG · WEBP — or paste from clipboard</div>
      </div>
    </div>

    ${!hasCmds && !hasNotes && !imgs.length ? `
      <div class="empty-msg">No content yet.<div class="hint2">Tap Edit to add commands and notes.</div></div>
    ` : ''}
  `;
  content.scrollTop = 0;
}

function copyCmd(secId, entryId, btn) {
  const sec = db.sections.find(s => s.id === secId);
  const entry = sec?.entries.find(e => e.id === entryId);
  if (!entry?.commands) return;
  navigator.clipboard.writeText(entry.commands).then(() => {
    btn.textContent = 'copied ✓'; btn.style.color = 'var(--success)';
    setTimeout(() => { btn.textContent = 'copy'; btn.style.color = ''; }, 2000);
  }).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = entry.commands;
    document.body.appendChild(ta); ta.select(); document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('Copied ✓');
  });
}

/* ── Images ── */
function handleDrop(e, secId, entryId) {
  e.preventDefault();
  document.getElementById(`drop-${entryId}`)?.classList.remove('drag-over');
  processImages(Array.from(e.dataTransfer.files).filter(f=>f.type.startsWith('image/')), secId, entryId);
}
function handleFileInput(e, secId, entryId) {
  processImages(Array.from(e.target.files), secId, entryId);
}
function processImages(files, secId, entryId) {
  const sec = db.sections.find(s => s.id === secId);
  const entry = sec?.entries.find(e => e.id === entryId);
  if (!entry || !files.length) return;
  if (!entry.images) entry.images = [];
  let pending = files.length;
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = ev => {
      entry.images.push({ name: file.name, data: ev.target.result });
      if (--pending === 0) { persist(); renderEntry(secId, entryId); showToast('Image added ✓'); }
    };
    reader.readAsDataURL(file);
  });
}
function deleteImage(secId, entryId, idx) {
  if (!confirm('Remove this image?')) return;
  const sec = db.sections.find(s => s.id === secId);
  const entry = sec?.entries.find(e => e.id === entryId);
  if (!entry?.images) return;
  entry.images.splice(idx, 1);
  persist(); renderEntry(secId, entryId);
}

/* ── Lightbox ── */
function openLightbox(secId, entryId, idx) {
  const entry = db.sections.find(s=>s.id===secId)?.entries.find(e=>e.id===entryId);
  const img = entry?.images?.[idx];
  if (!img) return;
  document.getElementById('lightbox-img').src = img.data;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox() { document.getElementById('lightbox').classList.remove('open'); }

/* ── Paste ── */
document.addEventListener('paste', e => {
  if (!activeSection || !activeEntry) return;
  const items = Array.from(e.clipboardData.items).filter(it=>it.type.startsWith('image/'));
  if (!items.length) return;
  const entry = db.sections.find(s=>s.id===activeSection)?.entries.find(en=>en.id===activeEntry);
  if (!entry) return;
  if (!entry.images) entry.images = [];
  let pending = items.length;
  items.forEach(item => {
    const reader = new FileReader();
    reader.onload = ev => {
      entry.images.push({ name: `pasted-${Date.now()}.png`, data: ev.target.result });
      if (--pending === 0) { persist(); renderEntry(activeSection, activeEntry); showToast('Image pasted ✓'); }
    };
    reader.readAsDataURL(item.getAsFile());
  });
});

/* ── Filter ── */
function filterTree(q) { filterText = q; renderTree(); }

/* ── Modals ── */
function openAddSectionModal() {
  showModal(`
    <div class="modal-handle"></div>
    <h2>Add section</h2>
    <div class="form-row"><label>Section ID</label><input id="f-sec-id" placeholder="e.g. 5.2" inputmode="decimal" /></div>
    <div class="form-row"><label>Title</label><input id="f-sec-title" placeholder="e.g. Firewall Policies" /></div>
    <div class="form-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="submitAddSection()">Add section</button>
    </div>
  `);
}
function submitAddSection() {
  const id = document.getElementById('f-sec-id').value.trim();
  const title = document.getElementById('f-sec-title').value.trim();
  if (!id) { alert('Section ID required'); return; }
  if (db.sections.find(s=>s.id===id)) { alert('Already exists'); return; }
  db.sections.push({ id, title: title||id, entries: [] });
  db.sections.sort((a,b)=>a.id.localeCompare(b.id,undefined,{numeric:true}));
  persist(); closeModal(); activeSection = id; renderTree();
}

function openAddEntryModal() {
  const sec = db.sections.find(s=>s.id===activeSection);
  if (!sec) return;
  const sug = `${sec.id}.${sec.entries.length+1}`;
  showModal(`
    <div class="modal-handle"></div>
    <h2>Add task to <span style="color:var(--accent-text);font-family:var(--mono)">${esc(sec.id)}</span></h2>
    <div class="form-row"><label>Task ID</label><input id="f-id" value="${esc(sug)}" /></div>
    <div class="form-row"><label>Title</label><input id="f-title" placeholder="Brief description" /></div>
    <div class="form-row"><label>Commands</label><textarea id="f-cmds" placeholder="Paste or type CLI commands…" rows="6"></textarea></div>
    <div class="form-row"><label>Notes</label><textarea id="f-notes" placeholder="Context, caveats, gotchas…" rows="3"></textarea></div>
    <div class="form-row"><label>Tags (comma-separated)</label><input id="f-tags" placeholder="vpn, ipsec, phase1" /></div>
    <div class="form-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="submitAddEntry('${esc(activeSection)}')">Save</button>
    </div>
  `);
}
function submitAddEntry(secId) {
  const sec = db.sections.find(s=>s.id===secId);
  const id = document.getElementById('f-id').value.trim();
  if (!id) { alert('Task ID required'); return; }
  if (sec.entries.find(e=>e.id===id)) { alert('Entry already exists'); return; }
  const entry = {
    id, title: document.getElementById('f-title').value.trim()||id,
    commands: document.getElementById('f-cmds').value.trim(),
    notes: document.getElementById('f-notes').value.trim(),
    tags: document.getElementById('f-tags').value.split(',').map(t=>t.trim()).filter(Boolean),
    images: []
  };
  sec.entries.push(entry);
  sec.entries.sort((a,b)=>a.id.localeCompare(b.id,undefined,{numeric:true}));
  persist(); closeModal(); activeEntry = id; renderTree(); renderEntry(secId, id);
}

function openEditModal(secId, entryId) {
  const entry = db.sections.find(s=>s.id===secId)?.entries.find(e=>e.id===entryId);
  if (!entry) return;
  showModal(`
    <div class="modal-handle"></div>
    <h2>Edit <span style="color:var(--accent-text);font-family:var(--mono)">${esc(entry.id)}</span></h2>
    <div class="form-row"><label>Title</label><input id="f-title" value="${esc(entry.title)}" /></div>
    <div class="form-row"><label>Commands</label><textarea id="f-cmds" rows="8">${esc(entry.commands||'')}</textarea></div>
    <div class="form-row"><label>Notes</label><textarea id="f-notes" rows="4">${esc(entry.notes||'')}</textarea></div>
    <div class="form-row"><label>Tags (comma-separated)</label><input id="f-tags" value="${esc((entry.tags||[]).join(', '))}" /></div>
    <div class="form-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="submitEdit('${esc(secId)}','${esc(entryId)}')">Save</button>
    </div>
  `);
}
function submitEdit(secId, entryId) {
  const entry = db.sections.find(s=>s.id===secId)?.entries.find(e=>e.id===entryId);
  if (!entry) return;
  entry.title = document.getElementById('f-title').value.trim()||entry.title;
  entry.commands = document.getElementById('f-cmds').value.trim();
  entry.notes = document.getElementById('f-notes').value.trim();
  entry.tags = document.getElementById('f-tags').value.split(',').map(t=>t.trim()).filter(Boolean);
  persist(); closeModal(); renderTree(); renderEntry(secId, entryId);
}

function deleteEntry(secId, entryId) {
  if (!confirm(`Delete ${entryId}?`)) return;
  const sec = db.sections.find(s=>s.id===secId);
  sec.entries = sec.entries.filter(e=>e.id!==entryId);
  persist(); activeEntry = null; renderTree();
  document.getElementById('content').innerHTML = `<div class="empty-msg">Entry deleted.</div>`;
  document.getElementById('breadcrumb').innerHTML = 'select a task';
  document.getElementById('btn-add-entry').style.display = 'none';
}

function showModal(html) {
  document.getElementById('modal-body').innerHTML = html;
  document.getElementById('overlay').classList.add('open');
  setTimeout(() => document.querySelector('.modal input, .modal textarea')?.focus(), 100);
}
function closeModal() { document.getElementById('overlay').classList.remove('open'); }
document.getElementById('overlay').addEventListener('click', e => { if (e.target === document.getElementById('overlay')) closeModal(); });

/* ── Export / Import ── */
function exportData() {
  const blob = new Blob([JSON.stringify(db, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'cmdref-backup.json';
  a.click(); URL.revokeObjectURL(url);
}
function importData() { document.getElementById('import-file').click(); }
function handleImport(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const parsed = JSON.parse(ev.target.result);
      if (!parsed.sections) throw new Error();
      if (confirm('Replace all current data with this backup?')) {
        db = parsed; persist(); activeSection = null; activeEntry = null; renderTree();
        document.getElementById('content').innerHTML = `<div id="welcome"><div class="wicon">⌨</div><p>Imported successfully.</p></div>`;
        document.getElementById('breadcrumb').innerHTML = 'select a task';
        document.getElementById('btn-add-entry').style.display = 'none';
        showToast('Import successful ✓');
      }
    } catch { alert('Invalid backup file.'); }
  };
  reader.readAsText(file); e.target.value = '';
}

/* ── Toast ── */
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._t); t._t = setTimeout(() => t.classList.remove('show'), 2200);
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

renderTree();
</script>
</body>
</html>
